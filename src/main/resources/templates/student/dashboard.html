﻿<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 - 在线教育系统</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">

</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/edu/student/dashboard">
                <i class="fas fa-graduation-cap me-2"></i>在线教育系统
            </a>
            
            <div class="navbar-nav ms-auto">
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i>
                        <span th:text="${user.realName}">学生姓名</span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/edu/auth/logout">
                            <i class="fas fa-sign-out-alt me-2"></i>退出登录
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div th:replace="~{student/sidebar :: sidebar(active='dashboard')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 欢迎信息 -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="stats-card">
                                <div class="row align-items-center">
                                    <div class="col-md-8">
                                        <h2>欢迎回来，<span th:text="${user.realName}">学生姓名</span>！</h2>
                                        <p class="mb-0">继续您的学习之旅，探索更多知识</p>
                                    </div>
                                    <div class="col-md-4 text-end">
                                        <div class="balance-display">
                                            ¥<span th:text="${user.balance}">1000.00</span>
                                        </div>
                                        <small>账户余额</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 统计卡片 -->
                    <div class="row">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-book fa-2x text-primary mb-3"></i>
                                    <h4>12</h4>
                                    <p class="text-muted">已购课程</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-clock fa-2x text-success mb-3"></i>
                                    <h4>156</h4>
                                    <p class="text-muted">学习时长(小时)</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-certificate fa-2x text-warning mb-3"></i>
                                    <h4>8</h4>
                                    <p class="text-muted">获得证书</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-ticket-alt fa-2x text-info mb-3"></i>
                                    <h4>3</h4>
                                    <p class="text-muted">可用优惠券</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 推荐课程 -->
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">
                                <i class="fas fa-star me-2"></i>推荐课程
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4" th:each="course : ${courses}">
                                    <div class="card course-card">
                                        <img th:src="${course.coverImage != null ? '/edu/api/files/view/' + course.coverImage : 'https://via.placeholder.com/300x200'}" 
                                             class="card-img-top" 
                                             alt="课程封面"
                                             onerror="this.src='https://via.placeholder.com/300x200'">
                                        <div class="card-body">
                                            <h6 class="card-title" th:text="${course.title}">课程标题</h6>
                                            <p class="card-text text-muted" th:text="${course.description}">课程描述</p>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <span class="text-danger h5">¥<span th:text="${course.price}">199</span></span>
                                                    <small class="text-muted text-decoration-line-through ms-2">
                                                        ¥<span th:text="${course.originalPrice}">299</span>
                                                    </small>
                                                </div>
                                                <!-- 根据是否已购买显示不同按钮 -->
                                                <div th:if="${paidCourseIds.contains(course.id)}">
                                                    <button class="btn btn-success btn-sm" 
                                                            onclick="startLearning(this)" 
                                                            th:data-course-id="${course.id}">
                                                        <i class="fas fa-play me-1"></i>立即学习
                                                    </button>
                                                </div>
                                                <div th:unless="${paidCourseIds.contains(course.id)}">
                                                    <button class="btn btn-primary btn-sm" 
                                                            onclick="buyCourse(this)" 
                                                            th:data-course-id="${course.id}"
                                                            th:data-course-price="${course.price}">
                                                        <i class="fas fa-shopping-cart me-1"></i>立即购买
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 购买课程 - 直接创建订单并跳转支付页面
        function buyCourse(button) {
            const courseId = button.getAttribute('data-course-id');
            const originalPrice = button.getAttribute('data-course-price');
            
            
            // 显示加载状态
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>处理中...';
            button.disabled = true;
            
            // 设置默认参数（攻击者可通过抓包修改这些值）
            const quantity = 1;
            const discount = 0.0;  // 折扣金额，0表示无折扣
            const shippingFee = 0.0;  // 运费
            
            // 发送购买请求，创建订单（包含价格、数量、折扣等参数供抓包测试）
            fetch('/edu/api/order/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    courseId: parseInt(courseId),
                    price: parseFloat(originalPrice),    // 课程价格（攻击者可通过抓包修改为0.01等）
                    quantity: quantity,                  // 数量（攻击者可通过抓包修改）
                    discount: discount,                  // 折扣金额（攻击者可通过抓包修改）
                    shippingFee: shippingFee            // 运费（攻击者可通过抓包修改）
                })
            })
            .then(response => {
                // 先检查HTTP状态码
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('服务器响应:', data);
                if (data.success) {
                    // 跳转到支付页面
                    window.location.href = `/edu/student/payment/${data.order.orderNo}`;
                } else {
                    // 显示详细的错误信息
                    let errorMsg = '订单创建失败';
                    if (data.message) {
                        errorMsg += '：' + data.message;
                    }
                    if (data.error) {
                        errorMsg += '\\n错误详情：' + data.error;
                    }
                    if (data.code) {
                        errorMsg += '\\n错误代码：' + data.code;
                    }
                    if (data.details) {
                        errorMsg += '\\n详细信息：' + JSON.stringify(data.details);
                    }
                    alert(errorMsg);
                }
            })
            .catch(error => {
                console.error('请求错误:', error);
                let errorMsg = '创建订单过程中发生错误';
                if (error.message) {
                    errorMsg += '：' + error.message;
                }
                alert(errorMsg);
            })
            .finally(() => {
                // 恢复按钮状态
                button.innerHTML = originalText;
                button.disabled = false;
            });
        }
        
        // 垂直越权测试
        function testVerticalEscalation() {
            const confirmed = confirm('这将尝试以管理员身份访问后台，是否继续？');
            return confirmed;
        }
        
        // 开始学习课程
        function startLearning(button) {
            const courseId = button.getAttribute('data-course-id');
            
            // 显示加载状态
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>加载中...';
            button.disabled = true;
            
            // 跳转到课程学习页面
            setTimeout(() => {
                window.location.href = `/edu/student/course/learn/${courseId}`;
            }, 500);
        }
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('学生仪表板加载完成');
            
            // 统计已购买课程数量
            const paidCourses = document.querySelectorAll('.btn-success[data-course-id]');
            console.log(`用户已购买 ${paidCourses.length} 门课程`);
        });
    </script>
</body>
</html>

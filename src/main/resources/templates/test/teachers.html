<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老师信息测试页面</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>老师信息测试页面</h1>
        
        <!-- 错误信息 -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <!-- 老师列表 -->
        <div class="card mb-4">
            <div class="card-header">
                <h3>老师列表</h3>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>身份证号</th>
                                <th>手机号</th>
                                <th>邮箱</th>
                                <th>地址</th>
                                <th>职称</th>
                                <th>专业</th>
                                <th>经验</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="teacher : ${teachers}">
                                <td th:text="${teacher.id}"></td>
                                <td th:text="${teacher.name}"></td>
                                <td th:text="${teacher.idCard}"></td>
                                <td th:text="${teacher.phone}"></td>
                                <td th:text="${teacher.email}"></td>
                                <td th:text="${teacher.address}"></td>
                                <td th:text="${teacher.title}"></td>
                                <td th:text="${teacher.speciality}"></td>
                                <td th:text="${teacher.experience + '年'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 课程与老师关联信息 -->
        <div class="card">
            <div class="card-header">
                <h3>课程与老师关联信息</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3" th:each="course : ${courses}">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${course.title}"></h5>
                                <p class="card-text" th:text="${course.description}"></p>
                                <div th:if="${course.teacherInfo != null}">
                                    <h6>老师信息：</h6>
                                    <ul class="list-unstyled">
                                        <li><strong>姓名：</strong><span th:text="${course.teacherInfo.name}"></span></li>
                                        <li><strong>职称：</strong><span th:text="${course.teacherInfo.title}"></span></li>
                                        <li><strong>专业：</strong><span th:text="${course.teacherInfo.speciality}"></span></li>
                                        <li><strong>身份证号：</strong><span th:text="${course.teacherInfo.idCard}"></span></li>
                                        <li><strong>手机号：</strong><span th:text="${course.teacherInfo.phone}"></span></li>
                                        <li><strong>邮箱：</strong><span th:text="${course.teacherInfo.email}"></span></li>
                                        <li><strong>地址：</strong><span th:text="${course.teacherInfo.address}"></span></li>
                                    </ul>
                                </div>
                                <div th:unless="${course.teacherInfo != null}">
                                    <p class="text-muted">未关联老师信息</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/edu/js/bootstrap.bundle.min.js"></script>
</body>
</html>

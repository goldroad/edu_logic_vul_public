<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <link href="/edu/css/admin-common.css" rel="stylesheet">
    <style>
        /* 订单页面特有样式 */
        .order-table {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/sidebar :: sidebar(active='orders')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题 -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-shopping-cart me-2"></i>订单管理</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/edu/admin/dashboard">仪表板</a></li>
                                <li class="breadcrumb-item active">订单管理</li>
                            </ol>
                        </nav>
                    </div>

                    <!-- 统计信息 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-shopping-cart fa-2x text-primary mb-3"></i>
                                    <h4 th:text="${statistics.totalOrders}">0</h4>
                                    <p class="text-muted">总订单数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-check-circle fa-2x text-success mb-3"></i>
                                    <h4 th:text="${statistics.paidCount}">0</h4>
                                    <p class="text-muted">已支付</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-clock fa-2x text-warning mb-3"></i>
                                    <h4 th:text="${statistics.pendingCount}">0</h4>
                                    <p class="text-muted">待支付</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-times-circle fa-2x text-danger mb-3"></i>
                                    <h4 th:text="${statistics.cancelledCount}">0</h4>
                                    <p class="text-muted">已取消</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 订单列表 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">
                                    <i class="fas fa-list me-2"></i>订单列表
                                </h5>
                                <div class="d-flex">
                                    <select id="statusFilter" class="form-select form-select-sm me-2" style="width: auto;" onchange="filterOrders()">
                                        <option value="">全部状态</option>
                                        <option value="PAID" th:selected="${selectedStatus == 'PAID'}">已支付</option>
                                        <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">待支付</option>
                                        <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">已取消</option>
                                    </select>
                                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="搜索订单..." style="width: 200px;" 
                                           th:value="${search}" onkeyup="searchOrders()">
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover order-table mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>订单号</th>
                                            <th>学员</th>
                                            <th>课程</th>
                                            <th>金额</th>
                                            <th>优惠券</th>
                                            <th>实付金额</th>
                                            <th>状态</th>
                                            <th>下单时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="orderTableBody">
                                        <tr th:each="order : ${orders}">
                                            <td><strong th:text="${order.orderNo}">订单号</strong></td>
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <div class="rounded-circle me-2 d-flex align-items-center justify-content-center text-white fw-bold"
                                                         style="width: 32px; height: 32px; background-color: #007bff;"
                                                         th:text="${#strings.substring(order.user.realName != null ? order.user.realName : order.user.username, 0, 1)}">
                                                    </div>
                                                    <div>
                                                        <div class="fw-bold" th:text="${order.user.realName != null ? order.user.realName : order.user.username}">用户名</div>
                                                        <small class="text-muted" th:text="${order.user.email}">email</small>
                                                    </div>
                                                </div>
                                            </td>
                                            <td>
                                                <div>
                                                    <div class="fw-bold" th:text="${order.course.title}">课程名称</div>
                                                    <small class="text-muted" th:text="${order.course.teacher != null ? order.course.teacher.realName : '未知教师'}">教师</small>
                                                </div>
                                            </td>
                                            <td th:text="'¥' + ${order.originalAmount}">¥0.00</td>
                                            <td>
                                                <span th:if="${order.discountAmount != null && order.discountAmount > 0}" class="badge bg-success">优惠券</span>
                                                <span th:if="${order.discountAmount == null || order.discountAmount == 0}" class="text-muted">无</span>
                                                <small th:if="${order.discountAmount != null && order.discountAmount > 0}" 
                                                       class="text-muted d-block" th:text="'-¥' + ${order.discountAmount}">-¥0.00</small>
                                            </td>
                                            <td><strong class="text-danger" th:text="'¥' + ${order.finalAmount}">¥0.00</strong></td>
                                            <td>
                                                <span th:class="'badge status-' + ${#strings.toLowerCase(order.status.name())}" 
                                                      th:text="${order.status.name() == 'PAID' ? '已支付' : (order.status.name() == 'PENDING' ? '待支付' : '已取消')}">状态</span>
                                            </td>
                                            <td>
                                                <div th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">创建时间</div>
                                                <small th:if="${order.payTime != null}" class="text-muted" 
                                                       th:text="'支付时间: ' + ${#temporals.format(order.payTime, 'HH:mm')}">支付时间</small>
                                            </td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <button class="btn btn-outline-primary" 
                                                            th:data-order-no="${order.orderNo}" 
                                                            onclick="viewOrder(this)" 
                                                            title="查看详情">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                    <button th:if="${order.status.name() == 'PAID'}" 
                                                            class="btn btn-outline-success" 
                                                            th:data-order-no="${order.orderNo}" 
                                                            onclick="refundOrder(this)" 
                                                            title="退款">
                                                        <i class="fas fa-undo"></i>
                                                    </button>
                                                    <button th:if="${order.status.name() == 'PENDING'}" 
                                                            class="btn btn-outline-warning" 
                                                            th:data-order-no="${order.orderNo}" 
                                                            onclick="remindPayment(this)" 
                                                            title="催付">
                                                        <i class="fas fa-bell"></i>
                                                    </button>
                                                    <button th:if="${order.status.name() == 'PENDING'}" 
                                                            class="btn btn-outline-danger" 
                                                            th:data-order-no="${order.orderNo}" 
                                                            onclick="cancelOrder(this)" 
                                                            title="取消订单">
                                                        <i class="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 分页 -->
                    <nav aria-label="订单分页" th:if="${totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/edu/admin/orders(page=${currentPage - 1}, status=${selectedStatus}, search=${search})}" 
                                   th:if="${currentPage > 1}">上一页</a>
                                <span class="page-link" th:if="${currentPage == 1}">上一页</span>
                            </li>
                            
                            <!-- 页码显示逻辑 -->
                            <th:block th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
                                <li class="page-item" th:if="${pageNum <= 3 || pageNum >= totalPages - 2 || (pageNum >= currentPage - 1 && pageNum <= currentPage + 1)}"
                                    th:classappend="${pageNum == currentPage} ? 'active' : ''">
                                    <a class="page-link" th:href="@{/edu/admin/orders(page=${pageNum}, status=${selectedStatus}, search=${search})}" 
                                       th:text="${pageNum}" th:if="${pageNum != currentPage}">1</a>
                                    <span class="page-link" th:if="${pageNum == currentPage}" th:text="${pageNum}">1</span>
                                </li>
                                <li class="page-item disabled" th:if="${pageNum == 4 && currentPage > 5}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item disabled" th:if="${pageNum == totalPages - 3 && currentPage < totalPages - 4}">
                                    <span class="page-link">...</span>
                                </li>
                            </th:block>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/edu/admin/orders(page=${currentPage + 1}, status=${selectedStatus}, search=${search})}" 
                                   th:if="${currentPage < totalPages}">下一页</a>
                                <span class="page-link" th:if="${currentPage == totalPages}">下一页</span>
                            </li>
                        </ul>
                        
                        <div class="text-center mt-3">
                            <small class="text-muted">
                                第 <span th:text="${currentPage}">1</span> 页，共 <span th:text="${totalPages}">1</span> 页，
                                总计 <span th:text="${totalOrders}">0</span> 个订单
                            </small>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 筛选订单
        function filterOrders() {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value;
            window.location.href = `/edu/admin/orders?page=1&status=${status}&search=${encodeURIComponent(search)}`;
        }
        
        // 搜索订单（防抖处理）
        let searchTimeout;
        function searchOrders() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterOrders();
            }, 500);
        }
        
        // 查看订单详情
        function viewOrder(button) {
            const orderNo = button.getAttribute('data-order-no');
            alert('查看订单详情: ' + orderNo);
            // 这里可以实现订单详情弹窗或跳转到详情页面
        }
        
        // 退款订单
        function refundOrder(button) {
            const orderNo = button.getAttribute('data-order-no');
            if (confirm('确定要退款订单 ' + orderNo + ' 吗？')) {
                alert('退款功能待实现');
                // 这里可以实现退款逻辑
            }
        }
        
        // 催付
        function remindPayment(button) {
            const orderNo = button.getAttribute('data-order-no');
            if (confirm('确定要催付订单 ' + orderNo + ' 吗？')) {
                alert('催付功能待实现');
                // 这里可以实现催付逻辑
            }
        }
        
        // 取消订单
        function cancelOrder(button) {
            const orderNo = button.getAttribute('data-order-no');
            if (confirm('确定要取消订单 ' + orderNo + ' 吗？')) {
                alert('取消订单功能待实现');
                // 这里可以实现取消订单逻辑
            }
        }
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 可以在这里添加页面初始化代码
        });
    </script>
</body>
</html>

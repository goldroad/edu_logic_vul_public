<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="sidebar(active)"
     th:class="${colClasses} ?: 'col-md-3 col-lg-2 px-0'">
    <div class="sidebar">
        <nav class="nav flex-column">
            <a class="nav-link"
               th:href="@{/admin/dashboard}"
               th:classappend="${active} == 'dashboard' ? ' active' : ''">
                <i class="fas fa-tachometer-alt me-2"></i>仪表盘
            </a>
            <a class="nav-link"
               th:href="@{/admin/users}"
               th:classappend="${active} == 'users' ? ' active' : ''">
                <i class="fas fa-users me-2"></i>用户管理
            </a>
            <a class="nav-link"
               th:href="@{/admin/courses}"
               th:classappend="${active} == 'courses' ? ' active' : ''">
                <i class="fas fa-book me-2"></i>课程管理
            </a>
            <a class="nav-link"
               th:href="@{/admin/orders}"
               th:classappend="${active} == 'orders' ? ' active' : ''">
                <i class="fas fa-shopping-cart me-2"></i>订单管理
            </a>
            <a class="nav-link"
               th:href="@{/admin/coupons}"
               th:classappend="${active} == 'coupons' ? ' active' : ''">
                <i class="fas fa-ticket-alt me-2"></i>优惠券管理
            </a>
            <a class="nav-link"
               th:href="@{/admin/profile}"
               th:classappend="${active} == 'profile' ? ' active' : ''">
                <i class="fas fa-user me-2"></i>管理员资料
            </a>
            <a class="nav-link"
               th:href="@{/admin/financial}"
               th:classappend="${active} == 'financial' ? ' active' : ''">
                <i class="fas fa-chart-line me-2"></i>财务报表
                <span class="admin-badge">机密</span>
            </a>
            <a class="nav-link"
               th:href="@{/admin/system}"
               th:classappend="${active} == 'system' ? ' active' : ''">
                <i class="fas fa-server me-2"></i>系统监控
                <span class="admin-badge">高危</span>
            </a>
            <a class="nav-link"
               th:href="@{/admin/logs}"
               th:classappend="${active} == 'logs' ? ' active' : ''">
                <i class="fas fa-file-alt me-2"></i>系统日志
                <span class="admin-badge">敏感</span>
            </a>
        </nav>
    </div>
</div>

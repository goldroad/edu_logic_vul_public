<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- 侧边栏组件 -->
    <div th:fragment="sidebar(active)" class="col-md-3 col-lg-2 sidebar">
        <nav class="nav flex-column">
            <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active' : ''" href="/edu/admin/dashboard">
                <i class="fas fa-tachometer-alt me-2"></i>仪表盘
            </a>
            <a class="nav-link" th:classappend="${active == 'users'} ? 'active' : ''" href="/edu/admin/users">
                <i class="fas fa-users me-2"></i>用户管理
            </a>
            <a class="nav-link" th:classappend="${active == 'courses'} ? 'active' : ''" href="/edu/admin/courses">
                <i class="fas fa-book me-2"></i>课程管理
            </a>
            <a class="nav-link" th:classappend="${active == 'orders'} ? 'active' : ''" href="/edu/admin/orders">
                <i class="fas fa-shopping-cart me-2"></i>订单管理
            </a>
            <a class="nav-link" th:classappend="${active == 'coupons'} ? 'active' : ''" href="/edu/admin/coupons">
                <i class="fas fa-ticket-alt me-2"></i>优惠券管理
            </a>
            <a class="nav-link" th:classappend="${active == 'financial'} ? 'active' : ''" href="/edu/admin/financial">
                <i class="fas fa-chart-line me-2"></i>财务报表
            </a>
            <a class="nav-link" th:classappend="${active == 'logs'} ? 'active' : ''" href="/edu/admin/logs">
                <i class="fas fa-file-alt me-2"></i>系统日志
            </a>
            <a class="nav-link" th:classappend="${active == 'system'} ? 'active' : ''" href="/edu/admin/system">
                <i class="fas fa-cog me-2"></i>系统设置
            </a>
            <a class="nav-link" th:classappend="${active == 'profile'} ? 'active' : ''" href="/edu/admin/profile">
                <i class="fas fa-user me-2"></i>个人资料
            </a>
        </nav>
    </div>
</body>
</html>

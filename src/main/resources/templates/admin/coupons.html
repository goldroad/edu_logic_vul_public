﻿<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券管理 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <link href="/edu/css/admin-common.css" rel="stylesheet">
    <style>
        /* 优惠券页面特有样式 */
        .coupon-card {
            transition: transform 0.3s;
            border-left: 5px solid #dc3545;
        }
        .coupon-card:hover {
            transform: translateY(-3px);
        }
        .coupon-code {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            color: #dc3545;
        }
        .discount-amount {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/sidebar :: sidebar(active='coupons')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题 -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-ticket-alt me-2"></i>优惠券管理</h2>
                        <div>
                            <button class="btn btn-danger me-2" onclick="showCreateCouponModal()">
                                <i class="fas fa-plus me-1"></i>创建优惠券
                            </button>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item"><a href="/edu/admin/dashboard">仪表板</a></li>
                                    <li class="breadcrumb-item active">优惠券管理</li>
                                </ol>
                            </nav>
                        </div>
                    </div>

                    <!-- 统计信息 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-ticket-alt fa-2x text-primary mb-3"></i>
                                    <h4 th:text="${statistics.total}">0</h4>
                                    <p class="text-muted">总优惠券数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-check-circle fa-2x text-success mb-3"></i>
                                    <h4 th:text="${statistics.active}">0</h4>
                                    <p class="text-muted">有效</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-clock fa-2x text-warning mb-3"></i>
                                    <h4 th:text="${statistics.usedUp}">0</h4>
                                    <p class="text-muted">已使用完</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-times-circle fa-2x text-danger mb-3"></i>
                                    <h4 th:text="${statistics.expired}">0</h4>
                                    <p class="text-muted">已过期</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 优惠券列表 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">
                                    <i class="fas fa-list me-2"></i>优惠券列表
                                </h5>
                                <div class="d-flex">
                                    <select class="form-select form-select-sm me-2" style="width: auto;" id="statusFilter" onchange="filterCoupons()">
                                        <option value="ALL" th:selected="${status == null or status == 'ALL'}">全部状态</option>
                                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">有效</option>
                                        <option value="USED_UP" th:selected="${status == 'USED_UP'}">已使用完</option>
                                        <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">已过期</option>
                                        <option value="DISABLED" th:selected="${status == 'DISABLED'}">已禁用</option>
                                    </select>
                                    <select class="form-select form-select-sm me-2" style="width: auto;" id="typeFilter" onchange="filterCoupons()">
                                        <option value="ALL">全部类型</option>
                                        <option value="FIXED">固定金额</option>
                                        <option value="PERCENT">百分比折扣</option>
                                    </select>
                                    <input type="text" class="form-control form-control-sm" placeholder="搜索优惠券..." style="width: 200px;" 
                                           id="searchInput" th:value="${keyword}" onkeypress="handleSearchKeyPress(event)">
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <!-- 优惠券卡片 -->
                                <div class="col-md-6 col-lg-4 mb-4" th:each="coupon : ${coupons}">
                                    <div class="card coupon-card h-100">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-between align-items-start mb-3">
                                                <div class="coupon-code" th:text="${coupon.code}">CODE</div>
                                                <span class="badge" 
                                                      th:classappend="${coupon.status == 'ACTIVE' ? 'status-active' : (coupon.status == 'EXPIRED' ? 'status-expired' : (coupon.status == 'USED_UP' ? 'status-used' : 'bg-secondary'))}"
                                                      th:text="${coupon.status == 'ACTIVE' ? '有效' : (coupon.status == 'EXPIRED' ? '已过期' : (coupon.status == 'USED_UP' ? '已使用完' : '已禁用'))}">状态</span>
                                            </div>
                                            <h6 class="card-title" th:text="${coupon.name}">优惠券名称</h6>
                                            <p class="card-text text-muted small" th:text="${coupon.name}">
                                                优惠券描述
                                            </p>
                                            <div class="row text-center mb-3">
                                                <div class="col-6">
                                                    <div class="discount-amount" 
                                                         th:text="${coupon.type.name() == 'FIXED' ? '¥' + coupon.discountValue : coupon.discountValue + '%'}">优惠</div>
                                                    <small class="text-muted" th:text="${coupon.type.name() == 'FIXED' ? '优惠金额' : '折扣比例'}">类型</small>
                                                </div>
                                                <div class="col-6">
                                                    <div class="fw-bold" th:text="${coupon.usedCount + '/' + coupon.totalCount}">0/0</div>
                                                    <small class="text-muted">已使用</small>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <small class="text-muted">
                                                    <i class="fas fa-calendar me-1"></i>
                                                    有效期：<span th:text="${#temporals.format(coupon.startTime, 'yyyy-MM-dd')}">开始</span> 至 <span th:text="${#temporals.format(coupon.endTime, 'yyyy-MM-dd')}">结束</span>
                                                </small>
                                            </div>
                                            <div class="d-flex justify-content-between">
                                                <button class="btn btn-outline-primary btn-sm" th:onclick="'editCoupon(' + ${coupon.id} + ')'">
                                                    <i class="fas fa-edit me-1"></i>编辑
                                                </button>
                                                <button class="btn btn-outline-success btn-sm" th:onclick="'viewCouponStats(' + ${coupon.id} + ')'">
                                                    <i class="fas fa-chart-bar me-1"></i>统计
                                                </button>
                                                <button class="btn btn-outline-danger btn-sm" 
                                                        th:if="${coupon.enabled}"
                                                        th:onclick="'toggleCouponStatus(' + ${coupon.id} + ', false)'">
                                                    <i class="fas fa-ban me-1"></i>禁用
                                                </button>
                                                <button class="btn btn-outline-success btn-sm" 
                                                        th:if="${!coupon.enabled}"
                                                        th:onclick="'toggleCouponStatus(' + ${coupon.id} + ', true)'">
                                                    <i class="fas fa-check me-1"></i>启用
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 分页 -->
                    <nav aria-label="优惠券分页" th:if="${totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/admin/coupons(page=${currentPage - 1}, status=${status}, keyword=${keyword})}" 
                                   th:if="${currentPage > 1}">上一页</a>
                                <span class="page-link" th:if="${currentPage == 1}">上一页</span>
                            </li>
                            
                            <li class="page-item" th:each="pageNum : ${#numbers.sequence(1, totalPages)}"
                                th:classappend="${pageNum == currentPage ? 'active' : ''}">
                                <a class="page-link" th:href="@{/admin/coupons(page=${pageNum}, status=${status}, keyword=${keyword})}"
                                   th:text="${pageNum}" th:if="${pageNum != currentPage}">1</a>
                                <span class="page-link" th:text="${pageNum}" th:if="${pageNum == currentPage}">1</span>
                            </li>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/admin/coupons(page=${currentPage + 1}, status=${status}, keyword=${keyword})}"
                                   th:if="${currentPage < totalPages}">下一页</a>
                                <span class="page-link" th:if="${currentPage == totalPages}">下一页</span>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建优惠券模态框 -->
    <div class="modal fade" id="createCouponModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建优惠券</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createCouponForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠券名称 *</label>
                                    <input type="text" class="form-control" id="couponName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠券代码</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="couponCode" placeholder="留空自动生成">
                                        <button type="button" class="btn btn-outline-secondary" onclick="generateCouponCode()">
                                            <i class="fas fa-random"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠类型 *</label>
                                    <select class="form-select" id="couponType" required onchange="updateDiscountLabel()">
                                        <option value="">请选择</option>
                                        <option value="FIXED">固定金额</option>
                                        <option value="PERCENT">百分比折扣</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" id="discountLabel">优惠值 *</label>
                                    <input type="number" class="form-control" id="discountValue" step="0.01" min="0" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">最低使用金额</label>
                                    <input type="number" class="form-control" id="minAmount" step="0.01" min="0" value="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">发放数量 *</label>
                                    <input type="number" class="form-control" id="totalCount" min="1" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">开始时间 *</label>
                                    <input type="datetime-local" class="form-control" id="startTime" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">结束时间 *</label>
                                    <input type="datetime-local" class="form-control" id="endTime" required>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="createCoupon()">创建优惠券</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑优惠券模态框 -->
    <div class="modal fade" id="editCouponModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑优惠券</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editCouponForm">
                        <input type="hidden" id="editCouponId">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠券名称 *</label>
                                    <input type="text" class="form-control" id="editCouponName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠券代码 *</label>
                                    <input type="text" class="form-control" id="editCouponCode" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优惠类型 *</label>
                                    <select class="form-select" id="editCouponType" required onchange="updateEditDiscountLabel()">
                                        <option value="FIXED">固定金额</option>
                                        <option value="PERCENT">百分比折扣</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" id="editDiscountLabel">优惠值 *</label>
                                    <input type="number" class="form-control" id="editDiscountValue" step="0.01" min="0" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">最低使用金额</label>
                                    <input type="number" class="form-control" id="editMinAmount" step="0.01" min="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">发放数量 *</label>
                                    <input type="number" class="form-control" id="editTotalCount" min="1" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">开始时间 *</label>
                                    <input type="datetime-local" class="form-control" id="editStartTime" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">结束时间 *</label>
                                    <input type="datetime-local" class="form-control" id="editEndTime" required>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="updateCoupon()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 优惠券统计模态框 -->
    <div class="modal fade" id="couponStatsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">优惠券统计详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- 统计汇总 -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title text-primary">总领取数</h5>
                                    <h3 class="card-text" id="totalReceived">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title text-success">已使用数</h5>
                                    <h3 class="card-text" id="totalUsed">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h5 class="card-title text-warning">未使用数</h5>
                                    <h3 class="card-text" id="totalUnused">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 筛选器 -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">筛选类型：</label>
                            <select class="form-select form-select-sm" id="statsTypeFilter" onchange="filterStatsType()">
                                <option value="">全部用户</option>
                                <option value="used">已使用</option>
                                <option value="received">已领取</option>
                            </select>
                        </div>
                    </div>

                    <!-- 用户统计表格 -->
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>真实姓名</th>
                                    <th>手机号</th>
                                    <th>邮箱</th>
                                    <th>状态</th>
                                    <th>领取时间</th>
                                    <th>使用时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 数据将通过JavaScript填充 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <nav id="statsPagination" style="display: none;">
                        <ul class="pagination justify-content-center">
                            <!-- 分页按钮将通过JavaScript生成 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 筛选优惠券
        function filterCoupons() {
            const status = document.getElementById('statusFilter').value;
            const keyword = document.getElementById('searchInput').value;
            
            let url = '/edu/admin/coupons?';
            if (status && status !== 'ALL') {
                url += 'status=' + status + '&';
            }
            if (keyword) {
                url += 'keyword=' + encodeURIComponent(keyword) + '&';
            }
            
            window.location.href = url;
        }

        // 搜索框回车事件
        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') {
                filterCoupons();
            }
        }

        // 显示创建优惠券模态框
        function showCreateCouponModal() {
            // 设置默认时间
            const now = new Date();
            const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            const nextMonth = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
            
            document.getElementById('startTime').value = formatDateTime(tomorrow);
            document.getElementById('endTime').value = formatDateTime(nextMonth);
            
            new bootstrap.Modal(document.getElementById('createCouponModal')).show();
        }

        // 格式化日期时间
        function formatDateTime(date) {
            return date.getFullYear() + '-' + 
                   String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(date.getDate()).padStart(2, '0') + 'T' + 
                   String(date.getHours()).padStart(2, '0') + ':' + 
                   String(date.getMinutes()).padStart(2, '0');
        }

        // 更新优惠值标签
        function updateDiscountLabel() {
            const type = document.getElementById('couponType').value;
            const label = document.getElementById('discountLabel');
            if (type === 'FIXED') {
                label.textContent = '优惠金额 (元) *';
            } else if (type === 'PERCENT') {
                label.textContent = '折扣百分比 (%) *';
            } else {
                label.textContent = '优惠值 *';
            }
        }

        function updateEditDiscountLabel() {
            const type = document.getElementById('editCouponType').value;
            const label = document.getElementById('editDiscountLabel');
            if (type === 'FIXED') {
                label.textContent = '优惠金额 (元) *';
            } else if (type === 'PERCENT') {
                label.textContent = '折扣百分比 (%) *';
            }
        }

        // 生成优惠券代码
        function generateCouponCode() {
            fetch('/edu/api/coupons/generate-code')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('couponCode').value = data.code;
                    } else {
                        alert('生成代码失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('生成代码失败');
                });
        }

        // 创建优惠券
        function createCoupon() {
            const formData = {
                name: document.getElementById('couponName').value,
                code: document.getElementById('couponCode').value,
                type: document.getElementById('couponType').value,
                discountValue: document.getElementById('discountValue').value,
                minAmount: document.getElementById('minAmount').value || 0,
                totalCount: document.getElementById('totalCount').value,
                startTime: document.getElementById('startTime').value.replace('T', ' ') + ':00',
                endTime: document.getElementById('endTime').value.replace('T', ' ') + ':00'
            };

            fetch('/edu/api/coupons', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('优惠券创建成功！');
                    location.reload();
                } else {
                    alert('创建失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('创建失败');
            });
        }

        // 编辑优惠券
        function editCoupon(couponId) {
            fetch('/edu/api/coupons/' + couponId)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const coupon = data.coupon;
                        document.getElementById('editCouponId').value = coupon.id;
                        document.getElementById('editCouponName').value = coupon.name;
                        document.getElementById('editCouponCode').value = coupon.code;
                        document.getElementById('editCouponType').value = coupon.type;
                        document.getElementById('editDiscountValue').value = coupon.discountValue;
                        document.getElementById('editMinAmount').value = coupon.minAmount;
                        document.getElementById('editTotalCount').value = coupon.totalCount;
                        document.getElementById('editStartTime').value = coupon.startTime.replace(' ', 'T').substring(0, 16);
                        document.getElementById('editEndTime').value = coupon.endTime.replace(' ', 'T').substring(0, 16);
                        
                        updateEditDiscountLabel();
                        new bootstrap.Modal(document.getElementById('editCouponModal')).show();
                    } else {
                        alert('获取优惠券信息失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取优惠券信息失败');
                });
        }

        // 更新优惠券
        function updateCoupon() {
            const couponId = document.getElementById('editCouponId').value;
            const formData = {
                name: document.getElementById('editCouponName').value,
                code: document.getElementById('editCouponCode').value,
                type: document.getElementById('editCouponType').value,
                discountValue: document.getElementById('editDiscountValue').value,
                minAmount: document.getElementById('editMinAmount').value,
                totalCount: document.getElementById('editTotalCount').value,
                startTime: document.getElementById('editStartTime').value.replace('T', ' ') + ':00',
                endTime: document.getElementById('editEndTime').value.replace('T', ' ') + ':00'
            };

            fetch('/edu/api/coupons/' + couponId, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('优惠券更新成功！');
                    location.reload();
                } else {
                    alert('更新失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('更新失败');
            });
        }

        // 切换优惠券状态
        function toggleCouponStatus(couponId, enabled) {
            const action = enabled ? '启用' : '禁用';
            if (confirm('确定要' + action + '这个优惠券吗？')) {
                fetch('/edu/api/coupons/' + couponId + '/status', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ enabled: enabled })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        location.reload();
                    } else {
                        alert('操作失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败');
                });
            }
        }

        // 查看优惠券统计
        function viewCouponStats(couponId) {
            showCouponStats(couponId);
        }

        let currentCouponId = null;
        let currentStatsPage = 1;
        let pageSize = 10;
        let currentStatsType = '';

        // 显示优惠券统计
        function showCouponStats(couponId) {
            currentCouponId = couponId;
            currentStatsPage = 1;
            currentStatsType = '';
            document.getElementById('statsTypeFilter').value = '';
            loadCouponStats();
            new bootstrap.Modal(document.getElementById('couponStatsModal')).show();
        }

        // 加载优惠券统计数据
        function loadCouponStats() {
            if (!currentCouponId) return;

            const url = `/edu/api/coupons/${currentCouponId}/stats?page=${currentStatsPage}&size=${pageSize}&type=${currentStatsType}`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        displayCouponStats(data);
                    } else {
                        throw new Error(data.message || '获取统计信息失败');
                    }
                })
                .catch(error => {
                    console.error('Error loading coupon stats:', error);
                    alert('获取统计信息失败：' + error.message);
                });
        }

        // 筛选统计类型
        function filterStatsType() {
            currentStatsType = document.getElementById('statsTypeFilter').value;
            currentStatsPage = 1;
            loadCouponStats();
        }

        // 显示优惠券统计
        function displayCouponStats(data) {
            // 显示汇总信息
            document.getElementById('totalReceived').textContent = data.summary.totalReceived;
            document.getElementById('totalUsed').textContent = data.summary.totalUsed;
            document.getElementById('totalUnused').textContent = data.summary.totalUnused;

            // 显示用户统计表格
            const tbody = document.querySelector('#couponStatsModal tbody');
            tbody.innerHTML = '';
            
            if (data.userStats && data.userStats.length > 0) {
                data.userStats.forEach(stat => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${stat.username || '未知用户'}</td>
                        <td>${stat.realName || '未设置'}</td>
                        <td>${stat.phone || '未设置'}</td>
                        <td>${stat.email || '未设置'}</td>
                        <td><span class="badge ${getStatusBadgeClass(stat.status)}">${getStatusText(stat.status)}</span></td>
                        <td>${stat.receiveTime ? new Date(stat.receiveTime).toLocaleString() : '-'}</td>
                        <td>${stat.useTime ? new Date(stat.useTime).toLocaleString() : '-'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">暂无数据</td></tr>';
            }
            
            // 显示分页
            displayStatsPagination(data.currentPage, data.totalPages, data.total);
        }

        // 显示分页
        function displayStatsPagination(currentPage, totalPages, total) {
            const pagination = document.getElementById('statsPagination');
            const ul = pagination.querySelector('ul');
            
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'block';
            ul.innerHTML = '';
            
            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="goToStatsPage(${currentPage - 1})">上一页</a>`;
            ul.appendChild(prevLi);
            
            // 页码
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="goToStatsPage(${i})">${i}</a>`;
                ul.appendChild(li);
            }
            
            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="goToStatsPage(${currentPage + 1})">下一页</a>`;
            ul.appendChild(nextLi);
        }

        // 跳转到指定页
        function goToStatsPage(page) {
            if (page < 1) return;
            currentStatsPage = page;
            loadCouponStats();
        }

        // 获取状态徽章样式
        function getStatusBadgeClass(status) {
            switch (status) {
                case 'USED': return 'bg-success';
                case 'UNUSED': return 'bg-primary';
                case 'EXPIRED': return 'bg-secondary';
                default: return 'bg-secondary';
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            switch (status) {
                case 'USED': return '已使用';
                case 'UNUSED': return '未使用';
                case 'EXPIRED': return '已过期';
                default: return '未知';
            }
        }
    </script>
</body>

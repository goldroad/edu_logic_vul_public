<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <link href="/edu/css/admin-common.css" rel="stylesheet">
    <style>
        /* 课程页面特有样式 */
        .course-image {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/sidebar :: sidebar(active='courses')}" th:with="colClasses='col-md-2 p-0'"></div>

            <!-- 主内容区 -->
            <div class="col-md-10">
                <div class="main-content">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold text-dark">课程管理</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/edu/admin/dashboard" class="text-decoration-none">首页</a></li>
                                <li class="breadcrumb-item active">课程管理</li>
                            </ol>
                        </nav>
                    </div>

                    <!-- 统计信息 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-book fa-2x text-primary mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.totalCourses : '0'}">0</h4>
                                    <p class="text-muted">总课程数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-eye fa-2x text-success mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.publishedCount : '0'}">0</h4>
                                    <p class="text-muted">已发布</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-edit fa-2x text-warning mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.draftCount : '0'}">0</h4>
                                    <p class="text-muted">草稿</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-eye-slash fa-2x text-secondary mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.offlineCount : '0'}">0</h4>
                                    <p class="text-muted">已下架</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 操作栏 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>课程列表</h5>
                                </div>
                                <div class="col-md-6 text-end">
                                    <button class="btn btn-light me-2" onclick="showCreateCourseModal()">
                                        <i class="fas fa-plus me-1"></i>新增课程
                                    </button>
                                    <button class="btn btn-outline-light" onclick="location.reload()">
                                        <i class="fas fa-sync-alt me-1"></i>刷新
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <!-- 筛选和搜索 -->
                            <div class="row mb-4">
                                <div class="col-md-8">
                                    <div class="d-flex align-items-center">
                                        <select class="form-select form-select-sm me-2" id="statusFilter" style="width: auto;" onchange="filterCourses()">
                                            <option value="ALL" th:selected="${currentStatus == null or currentStatus == 'ALL'}">全部状态</option>
                                            <option value="PUBLISHED" th:selected="${currentStatus == 'PUBLISHED'}">已发布</option>
                                            <option value="DRAFT" th:selected="${currentStatus == 'DRAFT'}">草稿</option>
                                            <option value="OFFLINE" th:selected="${currentStatus == 'OFFLINE'}">已下架</option>
                                        </select>
                                        <input type="text" class="form-control search-box" id="searchInput" 
                                               placeholder="搜索课程标题..." th:value="${currentSearch}"
                                               onkeypress="if(event.key==='Enter') searchCourses()">
                                        <button class="btn btn-danger ms-2" onclick="searchCourses()">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 课程列表 -->
                            <div class="row" th:if="${courses != null and !courses.isEmpty()}">
                                <div class="col-md-4 mb-4" th:each="course : ${courses}">
                                    <div class="card h-100">
                                        <div class="position-relative">
                                            <img th:src="${course.coverImage != null ? '/edu/files/' + course.coverImage : '/edu/pic/bafang.jpg'}" 
                                                 class="card-img-top course-image" alt="课程封面">
                                            <span class="badge position-absolute top-0 end-0 m-2 status-badge" 
                                                  th:classappend="${course.status.name() == 'PUBLISHED' ? 'bg-success' : (course.status.name() == 'OFFLINE' ? 'bg-secondary' : 'bg-warning')}"
                                                  th:text="${course.status.name() == 'PUBLISHED' ? '已发布' : (course.status.name() == 'OFFLINE' ? '已下架' : '草稿')}">已发布</span>
                                        </div>
                                        <div class="card-body">
                                            <h6 class="card-title fw-bold" th:text="${course.title}">课程标题</h6>
                                            <p class="card-text text-muted small" th:text="${course.description}">课程描述</p>
                                            <!-- 老师信息 -->
                                            <div class="teacher-info mb-2" th:if="${course.teacherInfo != null}">
                                                <small class="text-muted">
                                                    <i class="fas fa-user me-1"></i>
                                                    <span th:text="${course.teacherInfo.name}">老师姓名</span>
                                                    <span th:if="${course.teacherInfo.title != null}" 
                                                          th:text="' (' + ${course.teacherInfo.title} + ')'" class="ms-1"></span>
                                                </small>
                                                <div style="display: none;" 
                                                     th:attr="data-teacher-id=${course.teacherInfo.id},
                                                              data-teacher-idcard=${course.teacherInfo.idCard},
                                                              data-teacher-phone=${course.teacherInfo.phone},
                                                              data-teacher-email=${course.teacherInfo.email},
                                                              data-teacher-address=${course.teacherInfo.address}">
                                                </div>
                                            </div>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div>
                                                    <span class="text-danger fw-bold">¥<span th:text="${course.price}">199</span></span>
                                                    <small class="text-muted ms-2">
                                                        <i class="fas fa-user me-1"></i><span th:text="${course.studentCount}">0</span>人
                                                    </small>
                                                </div>
                                                <div class="btn-group btn-group-sm">
                                                    <button class="btn btn-outline-primary" title="编辑" 
                                                            th:onclick="'editCourse(' + ${course.id} + ')'">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button class="btn btn-outline-success" title="发布" 
                                                            th:if="${course.status.name() == 'DRAFT'}"
                                                            th:onclick="'updateCourseStatus(' + ${course.id} + ', \'PUBLISHED\')'">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                    <button class="btn btn-outline-warning" title="下架" 
                                                            th:if="${course.status.name() == 'PUBLISHED'}"
                                                            th:onclick="'updateCourseStatus(' + ${course.id} + ', \'OFFLINE\')'">
                                                        <i class="fas fa-eye-slash"></i>
                                                    </button>
                                                    <button class="btn btn-outline-success" title="重新发布" 
                                                            th:if="${course.status.name() == 'OFFLINE'}"
                                                            th:onclick="'updateCourseStatus(' + ${course.id} + ', \'PUBLISHED\')'">
                                                        <i class="fas fa-redo"></i>
                                                    </button>
                                                    <button class="btn btn-outline-danger" title="删除"
                                                            th:onclick="'deleteCourse(' + ${course.id} + ')'">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 空状态 -->
                            <div class="text-center py-5" th:if="${courses == null or courses.isEmpty()}">
                                <i class="fas fa-book fa-3x text-muted mb-3"></i>
                                <h5 class="text-muted">暂无课程数据</h5>
                                <p class="text-muted">点击"新增课程"按钮创建第一个课程</p>
                            </div>

                            <!-- 分页 -->
                            <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
                                <nav>
                                    <ul class="pagination">
                                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                            <a class="page-link" th:href="@{/admin/courses(page=${currentPage - 1}, status=${currentStatus}, search=${currentSearch})}">
                                                <i class="fas fa-chevron-left"></i>
                                            </a>
                                        </li>
                                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                                            th:classappend="${i == currentPage ? 'active' : ''}">
                                            <a class="page-link" th:href="@{/admin/courses(page=${i}, status=${currentStatus}, search=${currentSearch})}" 
                                               th:text="${i + 1}">1</a>
                                        </li>
                                        <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                                            <a class="page-link" th:href="@{/admin/courses(page=${currentPage + 1}, status=${currentStatus}, search=${currentSearch})}">
                                                <i class="fas fa-chevron-right"></i>
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增课程模态框 -->
    <div class="modal fade" id="createCourseModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新增课程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createCourseForm">
                        <div class="mb-3">
                            <label for="createCourseTitle" class="form-label">课程标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="createCourseTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="createCourseDescription" class="form-label">课程描述 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="createCourseDescription" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="createCoursePrice" class="form-label">课程价格 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="createCoursePrice" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="createCourseCover" class="form-label">课程封面</label>
                            <input type="file" class="form-control" id="createCourseCover" accept="image/*">
                            <div class="form-text">支持JPG、PNG格式，文件大小不超过5MB</div>
                            <div id="createCoverPreview" class="mt-2" style="display: none;">
                                <img id="createCoverImage" src="" alt="封面预览" style="max-width: 200px; max-height: 150px; border-radius: 5px;">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCreateCourse()">创建课程</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑课程模态框 -->
    <div class="modal fade" id="editCourseModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑课程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editCourseForm">
                        <input type="hidden" id="editCourseId">
                        <div class="mb-3">
                            <label for="editCourseTitle" class="form-label">课程标题</label>
                            <input type="text" class="form-control" id="editCourseTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="editCourseDescription" class="form-label">课程描述</label>
                            <textarea class="form-control" id="editCourseDescription" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="editCoursePrice" class="form-label">课程价格</label>
                            <input type="number" class="form-control" id="editCoursePrice" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="editCourseCover" class="form-label">课程封面</label>
                            <input type="file" class="form-control" id="editCourseCover" accept="image/*">
                            <div class="form-text">支持JPG、PNG格式，文件大小不超过5MB</div>
                            <div id="editCoverPreview" class="mt-2">
                                <img id="editCoverImage" src="" alt="当前封面" style="max-width: 200px; max-height: 150px; border-radius: 5px;">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveEditCourse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 显示新增课程模态框
        function showCreateCourseModal() {
            document.getElementById('createCourseForm').reset();
            document.getElementById('createCoverPreview').style.display = 'none';
            
            const modal = new bootstrap.Modal(document.getElementById('createCourseModal'));
            modal.show();
        }
        
        // 保存新增课程
        function saveCreateCourse() {
            const title = document.getElementById('createCourseTitle').value;
            const description = document.getElementById('createCourseDescription').value;
            const price = document.getElementById('createCoursePrice').value;
            const coverFile = document.getElementById('createCourseCover').files[0];
            
            if (!title || !description || !price) {
                alert('请填写所有必填字段');
                return;
            }
            
            if (parseFloat(price) <= 0) {
                alert('课程价格必须大于0');
                return;
            }
            
            if (coverFile) {
                uploadCoverAndCreateCourse(coverFile, title, description, price);
            } else {
                createCourse(title, description, price, null);
            }
        }
        
        // 上传封面并创建课程
        function uploadCoverAndCreateCourse(coverFile, title, description, price) {
            const formData = new FormData();
            formData.append('file', coverFile);
            
            fetch('/edu/admin/api/course-files/upload-cover', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    createCourse(title, description, price, data.filePath);
                } else {
                    alert('封面上传失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('封面上传失败');
            });
        }
        
        // 创建课程
        function createCourse(title, description, price, coverImage) {
            const courseData = {
                title: title,
                description: description,
                price: parseFloat(price),
                coverImage: coverImage
            };
            
            fetch('/edu/api/courses', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(courseData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('课程创建成功');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('createCourseModal'));
                    modal.hide();
                    location.reload();
                } else {
                    alert('课程创建失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('课程创建失败');
            });
        }
        
        // 处理封面文件选择（新增课程）
        document.getElementById('createCourseCover').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('文件大小不能超过5MB');
                    e.target.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('createCoverImage').src = e.target.result;
                    document.getElementById('createCoverPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 处理封面文件选择（编辑课程）
        document.getElementById('editCourseCover').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('文件大小不能超过5MB');
                    e.target.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editCoverImage').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 筛选课程
        function filterCourses() {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value;
            
            let url = '/edu/admin/courses?page=0';
            if (status && status !== 'ALL') {
                url += '&status=' + status;
            }
            if (search) {
                url += '&search=' + encodeURIComponent(search);
            }
            
            window.location.href = url;
        }
        
        // 搜索课程
        function searchCourses() {
            filterCourses();
        }
        
        // 编辑课程
        function editCourse(courseId) {
            fetch(`/edu/api/courses/${courseId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const course = data.course;
                        document.getElementById('editCourseId').value = course.id;
                        document.getElementById('editCourseTitle').value = course.title;
                        document.getElementById('editCourseDescription').value = course.description;
                        document.getElementById('editCoursePrice').value = course.price;
                        
                        if (course.coverImage) {
                            document.getElementById('editCoverImage').src = '/edu/files/' + course.coverImage;
                            document.getElementById('editCoverPreview').style.display = 'block';
                        } else {
                            document.getElementById('editCoverImage').src = '/edu/pic/bafang.jpg';
                            document.getElementById('editCoverPreview').style.display = 'block';
                        }
                        
                        const modal = new bootstrap.Modal(document.getElementById('editCourseModal'));
                        modal.show();
                    } else {
                        alert('获取课程信息失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取课程信息失败');
                });
        }
        
        // 保存编辑的课程
        function saveEditCourse() {
            const courseId = document.getElementById('editCourseId').value;
            const title = document.getElementById('editCourseTitle').value;
            const description = document.getElementById('editCourseDescription').value;
            const price = document.getElementById('editCoursePrice').value;
            const coverFile = document.getElementById('editCourseCover').files[0];
            
            if (!title || !description || !price) {
                alert('请填写所有必填字段');
                return;
            }
            
            if (coverFile) {
                uploadCoverAndUpdateCourse(coverFile, courseId, title, description, price);
            } else {
                updateCourse(courseId, title, description, price, null);
            }
        }
        
        // 上传封面并更新课程
        function uploadCoverAndUpdateCourse(coverFile, courseId, title, description, price) {
            const formData = new FormData();
            formData.append('file', coverFile);
            
            fetch('/edu/admin/api/course-files/upload-cover', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateCourse(courseId, title, description, price, data.filePath);
                } else {
                    alert('封面上传失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('封面上传失败');
            });
        }
        
        // 更新课程
        function updateCourse(courseId, title, description, price, coverImage) {
            const updateData = {
                title: title,
                description: description,
                price: parseFloat(price)
            };
            
            if (coverImage) {
                updateData.coverImage = coverImage;
            }
            
            fetch(`/edu/api/courses/${courseId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(updateData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('课程更新成功');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('editCourseModal'));
                    modal.hide();
                    location.reload();
                } else {
                    alert('课程更新失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('课程更新失败');
            });
        }
        
        // 更新课程状态
        function updateCourseStatus(courseId, status) {
            const statusText = status === 'PUBLISHED' ? '发布' : (status === 'OFFLINE' ? '下架' : '草稿');
            
            if (!confirm(`确定要${statusText}这个课程吗？`)) {
                return;
            }
            
            fetch(`/edu/api/courses/${courseId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ status: status })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`课程${statusText}成功`);
                    location.reload();
                } else {
                    alert(`课程${statusText}失败：` + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert(`课程${statusText}失败`);
            });
        }
        
        // 删除课程
        function deleteCourse(courseId) {
            if (!confirm('确定要删除这个课程吗？此操作不可恢复！')) {
                return;
            }
            
            fetch(`/edu/api/courses/${courseId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('课程删除成功');
                    location.reload();
                } else {
                    alert('课程删除失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('课程删除失败');
            });
        }
    </script>
</body>

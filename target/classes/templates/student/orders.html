﻿<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 在线教育系统</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">

</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{student/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div th:replace="~{student/sidebar :: sidebar(active='orders')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题 -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-shopping-cart me-2"></i>我的订单</h2>
                        <a href="/edu/student/dashboard" class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>继续购买
                        </a>
                    </div>

                    <!-- 订单筛选 -->
                    <div class="filter-tabs">
                        <ul class="nav nav-pills">
                            <li class="nav-item">
                                <a class="nav-link active" href="#" onclick="filterOrders('ALL')">
                                    <i class="fas fa-list me-2"></i>全部订单
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="filterOrders('PENDING')">
                                    <i class="fas fa-clock me-2"></i>待支付
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="filterOrders('PAID')">
                                    <i class="fas fa-check-circle me-2"></i>已完成
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="filterOrders('CANCELLED')">
                                    <i class="fas fa-times-circle me-2"></i>已取消
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- 订单列表 -->
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">
                                <i class="fas fa-list me-2"></i>订单列表
                            </h5>
                        </div>
                        <div class="card-body">
                            <!-- 订单列表 -->
                            <div class="row" id="ordersList">
                                <div class="col-12" th:each="order : ${orders}">
                                    <div class="card order-card" th:data-status="${order.status.name()}">
                                        <div class="card-body">
                                            <div class="row align-items-center">
                                                <div class="col-md-2">
                                                    <img th:src="'/edu/files/' + ${order.course.coverImage != null ? order.course.coverImage : 'https://via.placeholder.com/120x80'}" class="img-fluid rounded" alt="课程封面">
                                                </div>
                                                <div class="col-md-4">
                                                    <h6 th:text="${order.course.title}">课程标题</h6>
                                                    <p class="text-muted mb-1">订单号：<span th:text="${order.orderNo}">ORD123456789</span></p>
                                                    <small class="text-muted">下单时间：<span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}">2024-09-05 10:30:00</span></small>
                                                </div>
                                                <div class="col-md-2 text-center">
                                                    <span th:class="'badge ' + ${order.status.name() == 'PAID' ? 'bg-success' : (order.status.name() == 'PENDING' ? 'bg-warning' : (order.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-info'))}"
                                                          th:text="${order.status.name() == 'PAID' ? '已支付' : (order.status.name() == 'PENDING' ? '待支付' : (order.status.name() == 'CANCELLED' ? '已取消' : '处理中'))}">
                                                        订单状态
                                                    </span>
                                                </div>
                                                <div class="col-md-2 text-center">
                                                    <span class="h5 text-danger">¥<span th:text="${order.finalAmount}">199.00</span></span>
                                                    <br>
                                                    <small class="text-muted" th:if="${order.originalAmount != order.finalAmount}">
                                                        原价：¥<span th:text="${order.originalAmount}">299.00</span>
                                                    </small>
                                                </div>
                                                <div class="col-md-2 text-end">
                                                    <div th:if="${order.status.name() == 'PENDING'}">
                                                        <a th:href="@{'/student/payment/' + ${order.orderNo}}" class="btn btn-success btn-sm me-2">立即支付</a>
                                                        <button class="btn btn-outline-secondary btn-sm" th:data-order-no="${order.orderNo}" onclick="cancelOrder(this.dataset.orderNo)">取消订单</button>
                                                    </div>
                                                    <div th:if="${order.status.name() == 'PAID'}">
                                                        <button class="btn btn-primary btn-sm me-2">继续学习</button>
                                                        <button class="btn btn-outline-primary btn-sm" th:data-order-no="${order.orderNo}" onclick="viewOrderDetail(this.dataset.orderNo)">查看详情</button>
                                                    </div>
                                                    <div th:if="${order.status.name() == 'CANCELLED'}">
                                                        <button class="btn btn-outline-primary btn-sm" th:data-course-id="${order.course.id}" onclick="reorder(this.dataset.courseId)">再次购买</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- 空状态 -->
                                <div class="col-12" th:if="${#lists.isEmpty(orders)}" id="emptyState">
                                    <div class="text-center py-5">
                                        <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                                        <h5 class="text-muted">暂无订单</h5>
                                        <p class="text-muted">您还没有购买任何课程</p>
                                        <a href="/edu/student/dashboard" class="btn btn-primary">
                                            <i class="fas fa-plus me-2"></i>去购买课程
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 筛选订单
        function filterOrders(status) {
            const orderCards = document.querySelectorAll('.order-card');
            const navLinks = document.querySelectorAll('.filter-tabs .nav-link');
            
            // 更新导航状态
            navLinks.forEach(link => link.classList.remove('active'));
            event.target.classList.add('active');
            
            // 筛选订单
            let visibleCount = 0;
            orderCards.forEach(card => {
                if (status === 'ALL' || card.dataset.status === status) {
                    card.parentElement.style.display = 'block';
                    visibleCount++;
                } else {
                    card.parentElement.style.display = 'none';
                }
            });
            
            // 显示/隐藏空状态
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
            }
        }
        
        // 取消订单
        function cancelOrder(orderNo) {
            if (!confirm('确认取消此订单吗？')) {
                return;
            }
            
            fetch('/edu/student/cancel-order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ orderNo: orderNo })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('订单已取消');
                    location.reload();
                } else {
                    alert('取消订单失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('取消订单过程中发生错误');
            });
        }
        
        // 查看订单详情
        function viewOrderDetail(orderNo) {
            window.open(`/edu/student/order-detail/${orderNo}`, '_blank');
        }
        
        // 再次购买
        function reorder(courseId) {
            if (confirm('确认再次购买此课程吗？')) {
                window.location.href = `/edu/student/dashboard?courseId=${courseId}`;
            }
        }
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('订单页面加载完成');
        });
    </script>
</body>
</html>

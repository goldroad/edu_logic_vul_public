<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{student/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div th:replace="~{student/sidebar :: sidebar(active='courses')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题 -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-book me-2"></i>我的课程</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/edu/student/dashboard">学习中心</a></li>
                                <li class="breadcrumb-item active">我的课程</li>
                            </ol>
                        </nav>
                    </div>

                    <!-- 学习统计 -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card text-center" style="background: lab(62.33% 31.52 67.71); color: white;">
                                <div class="card-body">
                                    <i class="fas fa-list fa-2x mb-2"></i>
                                    <h4 th:text="${stats.total}">0</h4>
                                    <small>已购课程</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center" style="background: #28a745; color: white;">
                                <div class="card-body">
                                    <i class="fas fa-play fa-2x mb-2"></i>
                                    <h4 th:text="${stats.learning}">0</h4>
                                    <small>学习中</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center" style="background: #007bff; color: white;">
                                <div class="card-body">
                                    <i class="fas fa-check-circle fa-2x mb-2"></i>
                                    <h4 th:text="${stats.completed}">0</h4>
                                    <small>已完成</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 课程筛选 -->
                    <div class="filter-tabs">
                        <ul class="nav nav-pills" id="courseFilter">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="pill" href="#all-courses" data-status="all">
                                    <i class="fas fa-list me-1"></i>全部课程 (<span th:text="${stats.total}">0</span>)
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="pill" href="#learning-courses" data-status="learning">
                                    <i class="fas fa-play me-1"></i>学习中 (<span th:text="${stats.learning}">0</span>)
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="pill" href="#completed-courses" data-status="completed">
                                    <i class="fas fa-check-circle me-1"></i>已完成 (<span th:text="${stats.completed}">0</span>)
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="pill" href="#not-started-courses" data-status="not_started">
                                    <i class="fas fa-pause me-1"></i>未开始 (<span th:text="${stats.notStarted}">0</span>)
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- 搜索和排序 -->
                    <div class="card">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                                        <input type="text" class="form-control" placeholder="搜索课程名称或讲师...">
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <select class="form-select">
                                        <option>按学习进度排序</option>
                                        <option>按购买时间排序</option>
                                        <option>按课程名称排序</option>
                                        <option>按完成度排序</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <select class="form-select">
                                        <option>全部分类</option>
                                        <option>编程开发</option>
                                        <option>数据分析</option>
                                        <option>前端开发</option>
                                        <option>后端开发</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 课程内容 -->
                    <div class="tab-content" id="courseContent">
                        <!-- 全部课程 -->
                        <div class="tab-pane fade show active" id="all-courses">
                            <div class="row" id="courseList">
                                <!-- 动态生成课程卡片 -->
                                <div th:each="learn : ${learns}" class="col-md-6 col-lg-4">
                                    <div class="card course-card">
                                        <div class="course-image">
                                            <img th:src="${learn.course.coverImage != null ? '/edu/api/files/view/' + learn.course.coverImage : 'https://via.placeholder.com/300x200/667eea/ffffff?text=Course'}" 
                                                 th:alt="${learn.course.title}" 
                                                 onerror="this.src='https://via.placeholder.com/300x200/667eea/ffffff?text=Course'">
                                            <div class="course-status" 
                                                 th:classappend="${learn.status.name() == 'LEARNING'} ? 'status-learning' : 
                                                                 (${learn.status.name() == 'COMPLETED'} ? 'status-completed' : 'status-not-started')"
                                                 th:text="${learn.status.description}">学习状态</div>
                                            <div class="course-progress">
                                                <div class="d-flex justify-content-between mb-1">
                                                    <small>学习进度</small>
                                                    <small th:text="${learn.progress} + '%'">0%</small>
                                                </div>
                                                <div class="progress-bar-custom">
                                                    <div class="progress-fill" th:style="'width: ' + ${learn.progress} + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="course-info">
                                            <h5 class="course-title" th:text="${learn.course.title}">课程标题</h5>
                                            <div class="course-instructor">
                                                <i class="fas fa-user me-1"></i>
                                                <span th:text="${learn.course.teacherInfo != null ? learn.course.teacherInfo.name : '讲师'}">讲师</span>
                                                <div style="display: none;" 
                                                     th:if="${learn.course.teacherInfo != null}"
                                                     th:attr="data-teacher-id=${learn.course.teacherInfo.id},
                                                             data-teacher-idcard=${learn.course.teacherInfo.idCard},
                                                             data-teacher-phone=${learn.course.teacherInfo.phone},
                                                             data-teacher-email=${learn.course.teacherInfo.email},
                                                             data-teacher-address=${learn.course.teacherInfo.address}">
                                                </div>
                                            </div>
                                            <div class="course-stats">
                                                <span><i class="fas fa-clock me-1"></i>
                                                    <span th:text="${learn.course.duration != null ? learn.course.duration + '分钟' : '课时待定'}">课时</span>
                                                </span>
                                                <span><i class="fas fa-users me-1"></i>
                                                    <span th:text="${learn.course.studentCount} + '人学习'">学习人数</span>
                                                </span>
                                            </div>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <button class="btn btn-sm continue-learning-btn" 
                                                        th:classappend="${learn.status.name() == 'NOT_STARTED'} ? 'btn-outline-primary' : 'btn-primary'"
                                                        th:attr="data-course-id=${learn.courseId}">
                                                    <i class="fas fa-play me-1"></i>
                                                    <span th:text="${learn.status.name() == 'NOT_STARTED'} ? '开始学习' : '继续学习'">继续学习</span>
                                                </button>
                                                <div class="dropdown">
                                                    <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="dropdown">
                                                        <i class="fas fa-ellipsis-v"></i>
                                                    </button>
                                                    <ul class="dropdown-menu">
                                                        <li><a class="dropdown-item" href="#"><i class="fas fa-info me-2"></i>课程详情</a></li>
                                                        <li><a class="dropdown-item" href="#"><i class="fas fa-download me-2"></i>下载资料</a></li>
                                                        <li><a class="dropdown-item" href="#"><i class="fas fa-comments me-2"></i>课程讨论</a></li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 空状态提示 -->
                            <div th:if="${#lists.isEmpty(learns)}" class="text-center py-5">
                                <i class="fas fa-book fa-3x text-muted mb-3"></i>
                                <h5>暂无课程</h5>
                                <p class="text-muted">您还没有购买任何课程，快去选购吧！</p>
                                <a href="/edu/courses" class="btn btn-primary">浏览课程</a>
                            </div>
                        </div>

                        <!-- 其他标签页内容可以根据需要添加 -->
                        <div class="tab-pane fade" id="learning-courses">
                            <div class="text-center py-5">
                                <i class="fas fa-play fa-3x text-muted mb-3"></i>
                                <h5>学习中的课程</h5>
                                <p class="text-muted">这里显示正在学习的课程</p>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="completed-courses">
                            <div class="text-center py-5">
                                <i class="fas fa-check-circle fa-3x text-muted mb-3"></i>
                                <h5>已完成的课程</h5>
                                <p class="text-muted">这里显示已完成的课程</p>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="not-started-courses">
                            <div class="text-center py-5">
                                <i class="fas fa-pause fa-3x text-muted mb-3"></i>
                                <h5>未开始的课程</h5>
                                <p class="text-muted">这里显示尚未开始学习的课程</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 学习弹窗 -->
    <div class="modal fade" id="learningModal" tabindex="-1" aria-labelledby="learningModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="learningModalLabel">
                        <i class="fas fa-play me-2"></i>课程学习
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="learningFrame" src="" style="width: 100%; height: 600px; border: none;"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-1"></i>关闭
                    </button>
                    <button type="button" class="btn btn-primary" onclick="openFullScreen()">
                        <i class="fas fa-expand me-1"></i>全屏学习
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 课程筛选功能
        document.addEventListener('DOMContentLoaded', function() {
            // 筛选标签点击事件
            const filterTabs = document.querySelectorAll('#courseFilter .nav-link');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    const status = this.getAttribute('data-status');
                    filterCourses(status);
                });
            });

            // 继续学习按钮点击事件
            document.addEventListener('click', function(e) {
                if (e.target.closest('.continue-learning-btn')) {
                    const btn = e.target.closest('.continue-learning-btn');
                    const courseId = btn.getAttribute('data-course-id');
                    startLearning(courseId);
                }
            });
        });

        // 筛选课程
        function filterCourses(status) {
            if (status === 'all') {
                // 显示所有课程
                showAllCourses();
                return;
            }

            fetch(`/edu/student/courses/filter?status=${status}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderCourses(data.learns);
                    } else {
                        console.error('筛选课程失败:', data.message);
                    }
                })
                .catch(error => {
                    console.error('筛选课程出错:', error);
                });
        }

        // 显示所有课程
        function showAllCourses() {
            const allCourses = document.querySelectorAll('#courseList .col-md-6');
            allCourses.forEach(course => {
                course.style.display = 'block';
            });
        }

        // 渲染课程列表
        function renderCourses(learns) {
            const courseList = document.getElementById('courseList');
            
            if (learns.length === 0) {
                courseList.innerHTML = `
                    <div class="col-12">
                        <div class="text-center py-5">
                            <i class="fas fa-search fa-3x text-muted mb-3"></i>
                            <h5>没有找到相关课程</h5>
                            <p class="text-muted">请尝试其他筛选条件</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';
            learns.forEach(learn => {
                const statusClass = learn.status === 'LEARNING' ? 'status-learning' : 
                                  (learn.status === 'COMPLETED' ? 'status-completed' : 'status-not-started');
                const statusText = learn.status === 'LEARNING' ? '学习中' : 
                                 (learn.status === 'COMPLETED' ? '已完成' : '未开始');
                const btnClass = learn.status === 'NOT_STARTED' ? 'btn-outline-primary' : 'btn-primary';
                const btnText = learn.status === 'NOT_STARTED' ? '开始学习' : '继续学习';
                const teacherName = learn.course.teacherInfo ? learn.course.teacherInfo.name : '讲师';
                const duration = learn.course.duration ? learn.course.duration + '分钟' : '课时待定';

                html += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card course-card">
                            <div class="course-image">
                                <img src="${learn.course.coverImage ? '/edu/api/files/view/' + learn.course.coverImage : 'https://via.placeholder.com/300x200/667eea/ffffff?text=Course'}" alt="${learn.course.title}" 
                                     onerror="this.src='https://via.placeholder.com/300x200/667eea/ffffff?text=Course'">
                                <div class="course-status ${statusClass}">${statusText}</div>
                                <div class="course-progress">
                                    <div class="d-flex justify-content-between mb-1">
                                        <small>学习进度</small>
                                        <small>${learn.progress}%</small>
                                    </div>
                                    <div class="progress-bar-custom">
                                        <div class="progress-fill" style="width: ${learn.progress}%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="course-info">
                                <h5 class="course-title">${learn.course.title}</h5>
                                <div class="course-instructor">
                                    <i class="fas fa-user me-1"></i>${teacherName}
                                </div>
                                <div class="course-stats">
                                    <span><i class="fas fa-clock me-1"></i>${duration}</span>
                                    <span><i class="fas fa-users me-1"></i>${learn.course.studentCount}人学习</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <button class="btn btn-sm continue-learning-btn ${btnClass}" data-course-id="${learn.courseId}">
                                        <i class="fas fa-play me-1"></i>${btnText}
                                    </button>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="dropdown">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#"><i class="fas fa-info me-2"></i>课程详情</a></li>
                                            <li><a class="dropdown-item" href="#"><i class="fas fa-download me-2"></i>下载资料</a></li>
                                            <li><a class="dropdown-item" href="#"><i class="fas fa-comments me-2"></i>课程讨论</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            courseList.innerHTML = html;
        }

        // 开始/继续学习
        function startLearning(courseId) {
            // 显示加载状态
            const button = document.querySelector(`[data-course-id="${courseId}"]`);
            if (button) {
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>加载中...';
                button.disabled = true;
                
                // 恢复按钮状态的函数
                const restoreButton = () => {
                    button.innerHTML = originalText;
                    button.disabled = false;
                };
                
                // 发送请求验证学习权限
                fetch('/edu/student/start-learning', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        courseId: courseId
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 直接跳转到学习页面
                        window.location.href = `/edu/student/course/learn/${courseId}`;
                    } else {
                        restoreButton();
                        alert(data.message);
                    }
                })
                .catch(error => {
                    console.error('开始学习出错:', error);
                    restoreButton();
                    alert('开始学习失败，请稍后重试');
                });
            } else {
                // 如果找不到按钮，直接跳转到学习页面
                window.location.href = `/edu/student/course/learn/${courseId}`;
            }
        }

        // 显示学习弹窗
        function showLearningModal(courseId) {
            const modal = new bootstrap.Modal(document.getElementById('learningModal'));
            const iframe = document.getElementById('learningFrame');
            const modalTitle = document.getElementById('learningModalLabel');
            
            // 设置iframe源
            iframe.src = `/edu/student/course/learn/${courseId}`;
            
            // 更新标题
            const courseCard = document.querySelector(`[data-course-id="${courseId}"]`).closest('.course-card');
            const courseTitle = courseCard.querySelector('.course-title').textContent;
            modalTitle.innerHTML = `<i class="fas fa-play me-2"></i>${courseTitle} - 课程学习`;
            
            // 显示弹窗
            modal.show();
        }

        // 全屏学习
        function openFullScreen() {
            const iframe = document.getElementById('learningFrame');
            const courseUrl = iframe.src;
            
            // 关闭弹窗
            const modal = bootstrap.Modal.getInstance(document.getElementById('learningModal'));
            modal.hide();
            
            // 跳转到全屏学习页面
            window.location.href = courseUrl;
        }

        // 搜索功能
        const searchInput = document.querySelector('input[placeholder*="搜索课程"]');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                const courseCards = document.querySelectorAll('#courseList .course-card');
                
                courseCards.forEach(card => {
                    const title = card.querySelector('.course-title').textContent.toLowerCase();
                    const instructor = card.querySelector('.course-instructor').textContent.toLowerCase();
                    const container = card.closest('.col-md-6');
                    
                    if (title.includes(searchTerm) || instructor.includes(searchTerm)) {
                        container.style.display = 'block';
                    } else {
                        container.style.display = 'none';
                    }
                });
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{student/navbar :: navbar}"></div>

    <!-- 页面布局：左侧菜单 + 主内容（统一） -->
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div th:replace="~{student/sidebar :: sidebar(active='profile')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题与面包屑（与其他页面一致的顶部区块） -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-user me-2"></i>个人资料</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="/edu/student/dashboard">学习中心</a></li>
                                <li class="breadcrumb-item active">个人资料</li>
                            </ol>
                        </nav>
                    </div>

                    <!-- 头像与基本展示 -->
                    <div class="card mb-4">
                        <div class="profile-header">
                            <img th:src="${targetUser.avatar != null ? '/edu/' + targetUser.avatar : 'https://via.placeholder.com/120x120/667eea/ffffff?text=头像'}"
                                 src="https://via.placeholder.com/120x120/667eea/ffffff?text=头像"
                                 alt="用户头像" class="profile-avatar mb-3" id="profileAvatar">
                            <h3 th:text="${targetUser.realName != null ? targetUser.realName : '未设置姓名'}">用户姓名</h3>
                            <p class="mb-0" th:text="'@' + ${targetUser.username}">@username</p>
                            <!-- 头像上传按钮（仅本人可见） -->
                            <div th:if="${isOwnProfile}" class="mt-2">
                                <button type="button" class="btn btn-sm btn-outline-primary" onclick="changeAvatar()">
                                    <i class="fas fa-camera me-1"></i>更换头像
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 基本信息 -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-info-circle me-2"></i>基本信息</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>用户名</strong></label>
                                    <input type="text" class="form-control" th:value="${targetUser.username}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>真实姓名</strong></label>
                                    <input type="text" class="form-control" th:value="${targetUser.realName != null ? targetUser.realName : '未设置'}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>邮箱地址</strong></label>
                                    <input type="email" class="form-control" th:value="${targetUser.email != null ? targetUser.email : '未设置'}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>手机号码</strong></label>
                                    <input type="tel" class="form-control" th:value="${targetUser.phone != null ? targetUser.phone : '未设置'}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>用户角色</strong></label>
                                    <input type="text" class="form-control" th:value="${targetUser.role}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>账户余额</strong></label>
                                    <input type="text" class="form-control" th:value="'¥' + ${targetUser.balance != null ? targetUser.balance : 0.00}" readonly>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 账户状态 -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-shield-alt me-2"></i>账户状态</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>账户状态</strong></label>
                                    <div>
                                        <span th:if="${targetUser.enabled}" class="badge bg-success">
                                            <i class="fas fa-check-circle me-1"></i>已启用
                                        </span>
                                        <span th:unless="${targetUser.enabled}" class="badge bg-danger">
                                            <i class="fas fa-times-circle me-1"></i>已禁用
                                        </span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>注册时间</strong></label>
                                    <input type="text" class="form-control"
                                           th:value="${#temporals.format(targetUser.createTime, 'yyyy-MM-dd HH:mm:ss')}" readonly>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 操作按钮（仅本人可见） -->
                    <div class="card" th:if="${isOwnProfile}">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="fas fa-tools me-2"></i>账户操作</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                                <button type="button" class="btn btn-primary me-md-2" onclick="editProfile()">
                                    <i class="fas fa-edit me-1"></i>编辑资料
                                </button>
                                <button type="button" class="btn btn-outline-secondary me-md-2" onclick="changePassword()">
                                    <i class="fas fa-key me-1"></i>修改密码
                                </button>
                            </div>
                        </div>
                    </div>
                </div> <!-- /main-content -->
            </div> <!-- /col -->
        </div> <!-- /row -->
    </div> <!-- /container-fluid -->

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const isOwnProfile = /*[[${isOwnProfile}]]*/ true;
        const currentUserId = /*[[${user.id}]]*/ 1;
        const targetUserId = /*[[${targetUser.id}]]*/ 1;

        // 获取用户信息变量
        const targetUserRealName = /*[[${targetUser.realName != null ? targetUser.realName : ''}]]*/ '';
        const targetUserEmail = /*[[${targetUser.email != null ? targetUser.email : ''}]]*/ '';
        const targetUserPhone = /*[[${targetUser.phone != null ? targetUser.phone : ''}]]*/ '';

        // 编辑资料
        function editProfile() {
            // 创建编辑资料模态框
            const modalHtml = `
                <div class="modal fade" id="editProfileModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">编辑个人资料</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="editProfileForm">
                                    <div class="mb-3">
                                        <label for="editRealName" class="form-label">真实姓名</label>
                                        <input type="text" class="form-control" id="editRealName" 
                                               value="` + targetUserRealName + `" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editEmail" class="form-label">邮箱地址</label>
                                        <input type="email" class="form-control" id="editEmail" 
                                               value="` + targetUserEmail + `" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editPhone" class="form-label">手机号码</label>
                                        <input type="tel" class="form-control" id="editPhone" 
                                               value="` + targetUserPhone + `" required>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary" onclick="saveProfile()">保存修改</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的模态框
            const existingModal = document.getElementById('editProfileModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加模态框到页面
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('editProfileModal'));
            modal.show();
        }

        // 保存个人资料
        function saveProfile() {
            const realName = document.getElementById('editRealName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const phone = document.getElementById('editPhone').value.trim();
            
            if (!realName || !email || !phone) {
                alert('请填写所有必填字段');
                return;
            }
            
            // 邮箱格式验证
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('请输入有效的邮箱地址');
                return;
            }
            
            // 手机号格式验证
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                alert('请输入有效的手机号码');
                return;
            }
            
            const data = {
                realName: realName,
                email: email,
                phone: phone
            };
            
            fetch('/edu/student/update-profile', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('资料更新成功！');
                    // 关闭模态框
                    const modal = bootstrap.Modal.getInstance(document.getElementById('editProfileModal'));
                    modal.hide();
                    // 刷新页面显示最新信息
                    location.reload();
                } else {
                    alert('更新失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            });
        }

        // 修改密码
        function changePassword() {
            // 创建修改密码模态框
            const modalHtml = `
                <div class="modal fade" id="changePasswordModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">修改密码</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="changePasswordForm">
                                    <div class="mb-3">
                                        <label for="currentPassword" class="form-label">当前密码</label>
                                        <input type="password" class="form-control" id="currentPassword" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="newPassword" class="form-label">新密码</label>
                                        <input type="password" class="form-control" id="newPassword" 
                                               minlength="6" required>
                                        <div class="form-text">密码长度至少6位</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">确认新密码</label>
                                        <input type="password" class="form-control" id="confirmPassword" 
                                               minlength="6" required>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary" onclick="savePassword()">修改密码</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的模态框
            const existingModal = document.getElementById('changePasswordModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加模态框到页面
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
            modal.show();
        }

        // 保存新密码
        function savePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                alert('请填写所有密码字段');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('新密码长度至少6位');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('新密码与确认密码不匹配');
                return;
            }
            
            const data = {
                currentPassword: currentPassword,
                newPassword: newPassword,
                confirmPassword: confirmPassword
            };
            
            fetch('/edu/student/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('密码修改成功！');
                    // 关闭模态框
                    const modal = bootstrap.Modal.getInstance(document.getElementById('changePasswordModal'));
                    modal.hide();
                } else {
                    alert('修改失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            });
        }

        // 更换头像
        function changeAvatar() {
            // 创建头像上传模态框
            const modalHtml = `
                <div class="modal fade" id="changeAvatarModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">更换头像</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="avatarUploadForm" enctype="multipart/form-data">
                                    <div class="mb-3">
                                        <label for="avatarFile" class="form-label">选择头像文件</label>
                                        <input type="file" class="form-control" id="avatarFile" 
                                               accept="image/*" onchange="previewAvatar(this)" required>
                                        <div class="form-text">支持JPG、PNG格式，文件大小不超过2MB</div>
                                    </div>
                                    <div class="mb-3" id="avatarPreview" style="display: none;">
                                        <label class="form-label">预览</label>
                                        <div class="text-center">
                                            <img id="previewImg" src="" alt="头像预览" 
                                                 style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 2px solid #dee2e6;">
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary" onclick="uploadAvatar()">上传头像</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的模态框
            const existingModal = document.getElementById('changeAvatarModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // 添加模态框到页面
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('changeAvatarModal'));
            modal.show();
        }

        // 预览头像
        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // 检查文件类型
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    input.value = '';
                    return;
                }
                
                // 检查文件大小（2MB）
                if (file.size > 2 * 1024 * 1024) {
                    alert('文件大小不能超过2MB');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('avatarPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // 上传头像
        function uploadAvatar() {
            const fileInput = document.getElementById('avatarFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('请选择要上传的头像文件');
                return;
            }
            
            const formData = new FormData();
            formData.append('avatar', file);
            
            // 显示上传进度
            const uploadButton = document.querySelector('#changeAvatarModal .btn-primary');
            const originalText = uploadButton.textContent;
            uploadButton.textContent = '上传中...';
            uploadButton.disabled = true;
            
            fetch('/edu/student/upload-avatar', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('头像上传成功！');
                    // 关闭模态框
                    const modal = bootstrap.Modal.getInstance(document.getElementById('changeAvatarModal'));
                    modal.hide();
                    // 更新页面头像显示
                    if (result.avatarUrl) {
                        document.getElementById('profileAvatar').src = result.avatarUrl;
                    }
                    // 刷新页面显示最新信息
                    location.reload();
                } else {
                    alert('上传失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            })
            .finally(() => {
                // 恢复按钮状态
                uploadButton.textContent = originalText;
                uploadButton.disabled = false;
            });
        }

        // 页面加载完成后的处理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('个人资料页面加载完成');
            
            // 检查URL参数，如果没有id参数，重定向到带当前用户ID的URL
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            
            if (!userId) {
                // 没有ID参数，重定向到带当前用户ID的URL以确保从数据库查询最新信息
                const currentUserId = /*[[${user.id}]]*/ 1;
                window.location.href = '/edu/student/profile?id=' + currentUserId;
            } else {
                console.log('查看用户ID为 ' + userId + ' 的资料');
            }
        });
    </script>
</body>
<!-- 八方网域，无涯老师开发 -->
</html>

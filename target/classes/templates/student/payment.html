<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单支付 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <style>
        /* 页面特有样式 */
        .btn-primary {
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/edu/student/dashboard">
                <i class="fas fa-graduation-cap me-2"></i>在线教育系统
            </a>
            
            <div class="navbar-nav ms-auto">
                <div class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user me-1"></i>
                        <span th:text="${user.realName}">学生姓名</span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/student/profile(id=${user.id})}">
                            <i class="fas fa-user me-2"></i>个人资料
                        </a></li>
                        <li><a class="dropdown-item" href="/edu/student/orders">
                            <i class="fas fa-shopping-cart me-2"></i>我的订单
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/edu/auth/logout">
                            <i class="fas fa-sign-out-alt me-2"></i>退出登录
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="payment-container">
        <!-- 页面标题 -->
        <div class="text-center mb-4">
            <h2><i class="fas fa-credit-card me-2"></i>订单支付</h2>
            <p class="text-muted">请在 <span class="countdown" id="countdown">15:00</span> 内完成支付</p>
        </div>

        <!-- 订单信息 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-file-invoice me-2"></i>订单信息</h5>
            </div>
            <div class="card-body">
                <div class="order-info">
                    <div class="row">
                        <div class="col-md-8">
                            <h6 th:text="${order.course.title}">课程标题</h6>
                            <p class="text-muted mb-2" th:text="${order.course.description}">课程描述</p>
                            <small class="text-muted">
                                订单号：<span th:text="${order.orderNo}">ORD123456789</span><br>
                                创建时间：<span th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}">2024-09-05 16:30:00</span>
                            </small>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="price-display">
                                ¥<span id="finalPrice" th:text="${order.finalAmount}">199.00</span>
                            </div>
                            <small class="text-muted">
                                原价：¥<span id="originalPrice" th:text="${order.originalAmount}">299.00</span>
                            </small>
                            <div id="discountInfo" class="text-success mt-1" style="display: none;">
                                <small>优惠券折扣：-¥<span id="discountAmount">0.00</span></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 优惠券选择 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-ticket-alt me-2"></i>选择优惠券</h5>
            </div>
            <div class="card-body">
                <div id="couponsList">
                    <div class="text-center">
                        <i class="fas fa-spinner fa-spin"></i> 加载优惠券中...
                    </div>
                </div>
            </div>
        </div>

        <!-- 支付方式 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-wallet me-2"></i>选择支付方式</h5>
            </div>
            <div class="card-body">
                <div class="payment-method selected" onclick="selectPaymentMethod('BALANCE')">
                    <input type="radio" name="paymentMethod" value="BALANCE" checked>
                    <i class="fas fa-wallet me-2"></i>
                    <strong>余额支付</strong>
                    <div class="balance-info mt-2">
                        <i class="fas fa-info-circle me-1"></i>
                        当前余额：¥<span th:text="${user.balance}">1000.00</span>
                        <span th:if="${user.balance >= order.finalAmount}" class="text-success ms-2">
                            <i class="fas fa-check-circle"></i> 余额充足
                        </span>
                        <span th:if="${user.balance < order.finalAmount}" class="text-danger ms-2">
                            <i class="fas fa-exclamation-circle"></i> 余额不足
                        </span>
                    </div>
                </div>

                <div class="payment-method" onclick="selectPaymentMethod('ALIPAY')">
                    <input type="radio" name="paymentMethod" value="ALIPAY">
                    <i class="fab fa-alipay me-2"></i>
                    <strong>支付宝</strong>
                    <small class="text-muted ms-2">使用支付宝扫码支付</small>
                </div>

                <div class="payment-method" onclick="selectPaymentMethod('WECHAT')">
                    <input type="radio" name="paymentMethod" value="WECHAT">
                    <i class="fab fa-weixin me-2"></i>
                    <strong>微信支付</strong>
                    <small class="text-muted ms-2">使用微信扫码支付</small>
                </div>

                <div class="payment-method" onclick="selectPaymentMethod('BANK_CARD')">
                    <input type="radio" name="paymentMethod" value="BANK_CARD">
                    <i class="fas fa-credit-card me-2"></i>
                    <strong>银行卡支付</strong>
                    <small class="text-muted ms-2">支持各大银行储蓄卡和信用卡</small>
                </div>
            </div>
        </div>

        <!-- 支付按钮 -->
        <div class="text-center">
            <button class="btn btn-primary btn-lg me-3" onclick="confirmPayment()">
                <i class="fas fa-lock me-2"></i>确认支付 ¥<span th:text="${order.finalAmount}">199.00</span>
            </button>
            <a href="/edu/student/orders" class="btn btn-outline-secondary btn-lg">
                <i class="fas fa-arrow-left me-2"></i>返回订单
            </a>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        let selectedPaymentMethod = 'BALANCE';
        let selectedCoupon = null;
        const orderNo = /*[[${order.orderNo}]]*/ 'ORD123456789';
        const originalAmount = /*[[${order.originalAmount}]]*/ 299.00;
        let currentFinalAmount = /*[[${order.finalAmount}]]*/ 199.00;
        
        // 倒计时
        let timeLeft = 15 * 60; // 15分钟
        const countdownElement = document.getElementById('countdown');
        
        function updateCountdown() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            countdownElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                alert('支付超时，订单已取消');
                window.location.href = '/edu/student/orders';
                return;
            }
            
            timeLeft--;
        }
        
        // 每秒更新倒计时
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        // 页面加载完成后加载优惠券
        document.addEventListener('DOMContentLoaded', function() {
            loadAvailableCoupons();
        });
        
        // 加载可用优惠券
        function loadAvailableCoupons() {
            fetch('/edu/student/available-coupons')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderCoupons(data.data);
                    } else {
                        document.getElementById('couponsList').innerHTML = 
                            '<div class="text-center text-muted">暂无可用优惠券</div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading coupons:', error);
                    document.getElementById('couponsList').innerHTML = 
                        '<div class="text-center text-danger">加载优惠券失败</div>';
                });
        }
        
        // 渲染优惠券列表
        function renderCoupons(coupons) {
            const couponsList = document.getElementById('couponsList');
            
            if (!coupons || coupons.length === 0) {
                couponsList.innerHTML = '<div class="text-center text-muted">暂无可用优惠券</div>';
                return;
            }
            
            let html = '<div class="row">';
            
            // 添加"不使用优惠券"选项
            html += `
                <div class="col-12 mb-2">
                    <div class="coupon-item border rounded p-3" onclick="selectCoupon(null)" style="cursor: pointer;">
                        <div class="d-flex align-items-center">
                            <input type="radio" name="coupon" value="" checked>
                            <div class="ms-3">
                                <strong>不使用优惠券</strong>
                                <div class="text-muted small">按原价支付</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            coupons.forEach(coupon => {
                const isApplicable = checkCouponApplicable(coupon);
                const disabledClass = isApplicable ? '' : 'opacity-50';
                const disabledAttr = isApplicable ? '' : 'disabled';
                
                html += `
                    <div class="col-12 mb-2">
                        <div class="coupon-item border rounded p-3 ${disabledClass}" 
                             onclick="${isApplicable ? `selectCoupon(${coupon.id})` : ''}" 
                             style="cursor: ${isApplicable ? 'pointer' : 'not-allowed'};">
                            <div class="d-flex align-items-center">
                                <input type="radio" name="coupon" value="${coupon.id}" ${disabledAttr}>
                                <div class="ms-3 flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div>
                                            <strong>${coupon.couponName}</strong>
                                            <div class="text-muted small">${coupon.description}</div>
                                            <div class="text-muted small">
                                                有效期至：${new Date(coupon.expireTime).toLocaleDateString()}
                                            </div>
                                            ${!isApplicable ? '<div class="text-danger small">不满足使用条件</div>' : ''}
                                        </div>
                                        <div class="text-end">
                                            <div class="badge bg-primary">
                                                ${coupon.type === 'PERCENT' ? coupon.discountValue + '折' : '减' + coupon.discountValue + '元'}
                                            </div>
                                            ${coupon.minAmount > 0 ? `<div class="text-muted small">满${coupon.minAmount}可用</div>` : ''}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            couponsList.innerHTML = html;
        }
        
        // 检查优惠券是否可用
        function checkCouponApplicable(coupon) {
            // 检查最小金额限制
            if (coupon.minAmount > 0 && originalAmount < coupon.minAmount) {
                return false;
            }
            
            // 检查是否过期
            if (new Date(coupon.expireTime) < new Date()) {
                return false;
            }
            
            // 检查状态
            if (coupon.status !== 'UNUSED') {
                return false;
            }
            
            return true;
        }
        
        // 选择优惠券
        function selectCoupon(couponId) {
            selectedCoupon = couponId;
            
            // 更新radio按钮状态
            document.querySelectorAll('input[name="coupon"]').forEach(radio => {
                radio.checked = radio.value == (couponId || '');
            });
            
            // 更新优惠券项目样式
            document.querySelectorAll('.coupon-item').forEach(item => {
                item.classList.remove('border-primary', 'bg-light');
            });
            
            if (couponId) {
                event.currentTarget.classList.add('border-primary', 'bg-light');
            } else {
                document.querySelector('input[name="coupon"][value=""]').closest('.coupon-item')
                    .classList.add('border-primary', 'bg-light');
            }
            
            // 重新计算价格
            calculateFinalPrice();
        }
        
        // 计算最终价格
        function calculateFinalPrice() {
            let finalPrice = originalAmount;
            let discountAmount = 0;
            
            if (selectedCoupon) {
                // 从优惠券列表中找到选中的优惠券
                fetch('/edu/student/coupon-detail/' + selectedCoupon)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            const coupon = data.data;
                            if (coupon.type === 'PERCENT') {
                                discountAmount = originalAmount * (coupon.discountValue / 100);
                            } else if (coupon.type === 'FIXED') {
                                discountAmount = coupon.discountValue;
                            }
                            
                            finalPrice = Math.max(0, originalAmount - discountAmount);
                            updatePriceDisplay(finalPrice, discountAmount);
                        }
                    });
            } else {
                updatePriceDisplay(finalPrice, discountAmount);
            }
        }
        
        // 更新价格显示
        function updatePriceDisplay(finalPrice, discountAmount) {
            currentFinalAmount = finalPrice;
            document.getElementById('finalPrice').textContent = finalPrice.toFixed(2);
            
            if (discountAmount > 0) {
                document.getElementById('discountAmount').textContent = discountAmount.toFixed(2);
                document.getElementById('discountInfo').style.display = 'block';
            } else {
                document.getElementById('discountInfo').style.display = 'none';
            }
            
            // 更新支付按钮金额
            const payButton = document.querySelector('.btn-primary');
            if (payButton) {
                payButton.innerHTML = `<i class="fas fa-lock me-2"></i>确认支付 ¥${finalPrice.toFixed(2)}`;
            }
        }
        
        // 选择支付方式
        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            
            // 更新UI
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('selected');
            });
            
            event.currentTarget.classList.add('selected');
            
            // 更新radio按钮
            document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.checked = radio.value === method;
            });
        }
        
        // 确认支付
        function confirmPayment() {
            if (!selectedPaymentMethod) {
                alert('请选择支付方式');
                return;
            }
            
            // 获取当前页面显示的实际支付金额
            const confirmMsg = `确认使用${getPaymentMethodName(selectedPaymentMethod)}支付 ¥${currentFinalAmount.toFixed(2)} 吗？`;
            if (!confirm(confirmMsg)) {
                return;
            }
            
            // 显示加载状态
            const payButton = event.target;
            const originalText = payButton.innerHTML;
            payButton.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>支付中...';
            payButton.disabled = true;
            
            // 发送支付请求
            fetch('/edu/student/confirm-payment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    orderNo: orderNo,
                    paymentMethod: selectedPaymentMethod,
                    amount: currentFinalAmount,
                    couponId: selectedCoupon
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('支付成功！');
                    window.location.href = '/edu/student/orders';
                } else {
                    alert('支付失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('支付过程中发生错误');
            })
            .finally(() => {
                // 恢复按钮状态
                payButton.innerHTML = originalText;
                payButton.disabled = false;
            });
        }
        
        // 获取支付方式名称
        function getPaymentMethodName(method) {
            const names = {
                'BALANCE': '余额支付',
                'ALIPAY': '支付宝',
                'WECHAT': '微信支付',
                'BANK_CARD': '银行卡支付'
            };
            return names[method] || method;
        }
    </script>
</body>
<!-- 八方网域，无涯老师开发 -->
</html>

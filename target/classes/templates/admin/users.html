<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <link href="/edu/css/admin-common.css" rel="stylesheet">
    <style>
        /* 用户页面特有样式 */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/sidebar :: sidebar(active='users')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 页面标题 -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-users me-2"></i>用户管理</h2>
                        <div>
                            <button class="btn btn-danger me-2" onclick="showAddUserModal()">
                                <i class="fas fa-plus me-1"></i>新增用户
                            </button>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item"><a href="/edu/admin/dashboard">仪表板</a></li>
                                    <li class="breadcrumb-item active">用户管理</li>
                                </ol>
                            </nav>
                        </div>
                    </div>

                    <!-- 统计信息 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-users fa-2x text-primary mb-3"></i>
                                    <h4 th:text="${statistics.totalUsers}">0</h4>
                                    <p class="text-muted">总用户数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-user-graduate fa-2x text-info mb-3"></i>
                                    <h4 th:text="${statistics.studentCount}">0</h4>
                                    <p class="text-muted">学生</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-chalkboard-teacher fa-2x text-success mb-3"></i>
                                    <h4 th:text="${statistics.teacherCount}">0</h4>
                                    <p class="text-muted">教师</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-user-shield fa-2x text-danger mb-3"></i>
                                    <h4 th:text="${statistics.adminCount}">0</h4>
                                    <p class="text-muted">管理员</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 用户列表 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">
                                    <i class="fas fa-list me-2"></i>用户列表
                                </h5>
                                <div class="d-flex">
                                    <select id="roleFilter" class="form-select form-select-sm me-2" style="width: auto;" onchange="filterUsers()">
                                        <option value="">全部角色</option>
                                        <option value="STUDENT" th:selected="${selectedRole == 'STUDENT'}">学生</option>
                                        <option value="TEACHER" th:selected="${selectedRole == 'TEACHER'}">教师</option>
                                        <option value="ADMIN" th:selected="${selectedRole == 'ADMIN'}">管理员</option>
                                    </select>
                                    <select id="statusFilter" class="form-select form-select-sm me-2" style="width: auto;" onchange="filterUsers()">
                                        <option value="">全部状态</option>
                                        <option value="active" th:selected="${selectedStatus == 'active'}">活跃</option>
                                        <option value="inactive" th:selected="${selectedStatus == 'inactive'}">已封禁</option>
                                    </select>
                                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="搜索用户..." style="width: 200px;" 
                                           th:value="${search}" onkeyup="searchUsers()">
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>用户</th>
                                            <th>邮箱</th>
                                            <th>角色</th>
                                            <th>状态</th>
                                            <th>注册时间</th>
                                            <th>最后登录</th>
                                            <th>课程数/学习数</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userTableBody">
                                        <tr th:each="user : ${users}">
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <div class="user-avatar me-3 d-flex align-items-center justify-content-center text-white fw-bold"
                                                         th:style="'background-color: ' + (${user.role.name() == 'ADMIN'} ? '#dc3545' : (${user.role.name() == 'TEACHER'} ? '#28a745' : '#007bff'))"
                                                         th:text="${#strings.substring(user.realName != null ? user.realName : user.username, 0, 1)}">
                                                    </div>
                                                    <div>
                                                        <div class="fw-bold" th:text="${user.realName != null ? user.realName : user.username}">用户名</div>
                                                        <small class="text-muted" th:text="'ID: ' + ${user.id}">ID: 1</small>
                                                    </div>
                                                </div>
                                            </td>
                                            <td th:text="${user.email}">email@example.com</td>
                                            <td>
                                                <span th:class="'badge role-' + ${#strings.toLowerCase(user.role.name())}" 
                                                      th:text="${user.role.name() == 'ADMIN' ? '管理员' : (user.role.name() == 'TEACHER' ? '教师' : '学生')}">角色</span>
                                            </td>
                                            <td>
                                                <span th:class="'badge ' + (${user.enabled} ? 'status-active' : 'status-banned')" 
                                                      th:text="${user.enabled} ? '活跃' : '已封禁'">状态</span>
                                            </td>
                                            <td th:text="${#temporals.format(user.createTime, 'yyyy-MM-dd')}">2024-01-01</td>
                                            <td th:text="${#temporals.format(user.updateTime, 'yyyy-MM-dd HH:mm')}">2024-09-04 10:30</td>
                                            <td>-</td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <button class="btn btn-outline-primary" th:onclick="'viewUser(' + ${user.id} + ')'" title="查看详情">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                    <button class="btn btn-outline-warning" th:onclick="'editUser(' + ${user.id} + ')'" title="编辑">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button th:if="${user.enabled}" class="btn btn-outline-danger" th:onclick="'banUser(' + ${user.id} + ')'" title="封禁用户">
                                                        <i class="fas fa-ban"></i>
                                                    </button>
                                                    <button th:if="${!user.enabled}" class="btn btn-outline-success" th:onclick="'unbanUser(' + ${user.id} + ')'" title="解封用户">
                                                        <i class="fas fa-unlock"></i>
                                                    </button>
                                                    <button class="btn btn-outline-info" th:onclick="'resetPassword(' + ${user.id} + ')'" title="重置密码">
                                                        <i class="fas fa-key"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 分页 -->
                    <nav aria-label="用户分页" th:if="${totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, role=${selectedRole}, status=${selectedStatus}, search=${search})}" 
                                   th:if="${currentPage > 1}">上一页</a>
                                <span class="page-link" th:if="${currentPage == 1}">上一页</span>
                            </li>
                            
                            <!-- 页码显示逻辑 -->
                            <th:block th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
                                <li class="page-item" th:if="${pageNum <= 3 || pageNum >= totalPages - 2 || (pageNum >= currentPage - 1 && pageNum <= currentPage + 1)}"
                                    th:classappend="${pageNum == currentPage} ? 'active' : ''">
                                    <a class="page-link" th:href="@{/admin/users(page=${pageNum}, role=${selectedRole}, status=${selectedStatus}, search=${search})}" 
                                       th:text="${pageNum}" th:if="${pageNum != currentPage}">1</a>
                                    <span class="page-link" th:if="${pageNum == currentPage}" th:text="${pageNum}">1</span>
                                </li>
                                <li class="page-item disabled" th:if="${pageNum == 4 && currentPage > 5}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item disabled" th:if="${pageNum == totalPages - 3 && currentPage < totalPages - 4}">
                                    <span class="page-link">...</span>
                                </li>
                            </th:block>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, role=${selectedRole}, status=${selectedStatus}, search=${search})}" 
                                   th:if="${currentPage < totalPages}">下一页</a>
                                <span class="page-link" th:if="${currentPage == totalPages}">下一页</span>
                            </li>
                        </ul>
                        
                        <div class="text-center mt-3">
                            <small class="text-muted">
                                第 <span th:text="${currentPage}">1</span> 页，共 <span th:text="${totalPages}">1</span> 页，
                                总计 <span th:text="${totalUsers}">0</span> 个用户
                            </small>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    
    <!-- 用户详情模态框 -->
    <div class="modal fade" id="userDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">用户详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="userDetailContent">
                    <!-- 用户详情内容 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑用户模态框 -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm">
                        <input type="hidden" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" class="form-control" id="editRealName">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="editEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" class="form-control" id="editPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色</label>
                            <select class="form-select" id="editRole">
                                <option value="STUDENT">学生</option>
                                <option value="TEACHER">教师</option>
                                <option value="ADMIN">管理员</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveUserEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 新增用户模态框 -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新增用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="addUsername" required>
                            <div class="form-text">用户名用于登录，不能重复</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="addPassword" required>
                            <div class="form-text">密码长度至少6位</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" class="form-control" id="addRealName">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="addEmail">
                            <div class="form-text">邮箱不能重复</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" class="form-control" id="addPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色 <span class="text-danger">*</span></label>
                            <select class="form-select" id="addRole" required>
                                <option value="STUDENT">学生</option>
                                <option value="TEACHER">教师</option>
                                <option value="ADMIN">管理员</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveNewUser()">创建用户</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 筛选用户
        function filterUsers() {
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value;
            
            const url = new URL(window.location);
            url.searchParams.set('page', '1');
            if (role) url.searchParams.set('role', role);
            else url.searchParams.delete('role');
            if (status) url.searchParams.set('status', status);
            else url.searchParams.delete('status');
            if (search) url.searchParams.set('search', search);
            else url.searchParams.delete('search');
            
            window.location.href = url.toString();
        }
        
        // 搜索用户
        function searchUsers() {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(filterUsers, 500);
        }
        
        // 查看用户详情
        function viewUser(userId) {
            fetch(`/edu/api/admin/users/${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const user = data.user;
                        const content = `
                            <div class="row">
                                <div class="col-md-6">
                                    <p><strong>用户ID:</strong> ${user.id}</p>
                                    <p><strong>用户名:</strong> ${user.username}</p>
                                    <p><strong>真实姓名:</strong> ${user.realName || '未设置'}</p>
                                    <p><strong>邮箱:</strong> ${user.email || '未设置'}</p>
                                    <p><strong>手机号:</strong> ${user.phone || '未设置'}</p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>角色:</strong> ${getRoleText(user.role)}</p>
                                    <p><strong>状态:</strong> ${user.enabled ? '活跃' : '已封禁'}</p>
                                    <p><strong>余额:</strong> ¥${user.balance || 0}</p>
                                    <p><strong>注册时间:</strong> ${formatDateTime(user.createTime)}</p>
                                    <p><strong>更新时间:</strong> ${formatDateTime(user.updateTime)}</p>
                                </div>
                            </div>
                        `;
                        document.getElementById('userDetailContent').innerHTML = content;
                        new bootstrap.Modal(document.getElementById('userDetailModal')).show();
                    } else {
                        alert('获取用户信息失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取用户信息失败');
                });
        }
        
        // 编辑用户
        function editUser(userId) {
            fetch(`/edu/api/admin/users/${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const user = data.user;
                        document.getElementById('editUserId').value = user.id;
                        document.getElementById('editRealName').value = user.realName || '';
                        document.getElementById('editEmail').value = user.email || '';
                        document.getElementById('editPhone').value = user.phone || '';
                        document.getElementById('editRole').value = user.role;
                        
                        new bootstrap.Modal(document.getElementById('editUserModal')).show();
                    } else {
                        alert('获取用户信息失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取用户信息失败');
                });
        }
        
        // 保存用户编辑
        function saveUserEdit() {
            const userId = document.getElementById('editUserId').value;
            const formData = {
                realName: document.getElementById('editRealName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                role: document.getElementById('editRole').value
            };
            
            fetch(`/edu/api/admin/users/${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('用户信息更新成功');
                    bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                    location.reload();
                } else {
                    alert('更新失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('更新失败');
            });
        }
        
        // 封禁用户
        function banUser(userId) {
            if (confirm('确定要封禁这个用户吗？')) {
                fetch(`/edu/api/admin/users/${userId}/ban`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('用户已封禁');
                        location.reload();
                    } else {
                        alert('封禁失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('封禁失败');
                });
            }
        }
        
        // 解封用户
        function unbanUser(userId) {
            if (confirm('确定要解封这个用户吗？')) {
                fetch(`/edu/api/admin/users/${userId}/unban`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('用户已解封');
                        location.reload();
                    } else {
                        alert('解封失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('解封失败');
                });
            }
        }
        
        // 重置密码
        function resetPassword(userId) {
            if (confirm('确定要重置这个用户的密码吗？')) {
                fetch(`/edu/api/admin/users/${userId}/reset-password`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(`密码重置成功！新密码为: ${data.newPassword}`);
                    } else {
                        alert('重置失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('重置失败');
                });
            }
        }
        
        // 显示新增用户模态框
        function showAddUserModal() {
            // 清空表单
            document.getElementById('addUserForm').reset();
            new bootstrap.Modal(document.getElementById('addUserModal')).show();
        }
        
        // 保存新用户
        function saveNewUser() {
            const formData = {
                username: document.getElementById('addUsername').value.trim(),
                password: document.getElementById('addPassword').value,
                realName: document.getElementById('addRealName').value.trim(),
                email: document.getElementById('addEmail').value.trim(),
                phone: document.getElementById('addPhone').value.trim(),
                role: document.getElementById('addRole').value
            };
            
            // 基本验证
            if (!formData.username) {
                alert('请输入用户名');
                return;
            }
            
            if (!formData.password || formData.password.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            
            // 发送创建请求
            fetch('/edu/api/admin/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('用户创建成功');
                    bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                    location.reload();
                } else {
                    alert('创建失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('创建失败，请检查网络连接');
            });
        }
        
        // 辅助函数
        function getRoleText(role) {
            switch(role) {
                case 'ADMIN': return '管理员';
                case 'TEACHER': return '教师';
                case 'STUDENT': return '学生';
                default: return role;
            }
        }
        
        function formatDateTime(dateTime) {
            if (!dateTime) return '未知';
            return new Date(dateTime).toLocaleString('zh-CN');
        }
        
        // 页面加载完成后设置搜索框值
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const search = urlParams.get('search');
            if (search) {
                document.getElementById('searchInput').value = search;
            }
        });
    </script>
</body>
</html>

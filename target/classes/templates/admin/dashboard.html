<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 八方网域逻辑漏洞靶场</title>
    <link href="/edu/css/bootstrap.min.css" rel="stylesheet">
    <link href="/edu/css/all.min.css" rel="stylesheet">
    <link href="/edu/css/common.css" rel="stylesheet">
    <link href="/edu/css/admin-common.css" rel="stylesheet">
    <style>
        /* Dashboard 页面特有样式 */
        .stats-card {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
            padding: 2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/sidebar :: sidebar(active='dashboard')}"></div>

            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <!-- 权限验证警告 -->
                    <!-- <div class="alert alert-warning" th:if="${user == null or user.role.name() != 'ADMIN'}">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>权限提示：</strong>您当前不是管理员用户，但仍能访问此页面
                    </div> -->
                    
                    <!-- 欢迎信息 -->
                    <div class="row">
                        <div class="col-12">
                            <div class="stats-card">
                                <div class="row align-items-center">
                                    <div class="col-md-8">
                                        <h2>管理员控制台</h2>
                                        <p class="mb-0">系统管理和监控中心</p>
                                    </div>
                                    <div class="col-md-4 text-end">
                                        <div class="h3">
                                            <i class="fas fa-shield-alt me-2"></i>
                                            最高权限
                                        </div>
                                        <small>管理员权限</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 统计卡片 -->
                    <div class="row">
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-users fa-2x text-danger mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.totalUsers : '0'}">0</h4>
                                    <p class="text-muted">总用户数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-book fa-2x text-warning mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.totalCourses : '0'}">0</h4>
                                    <p class="text-muted">课程总数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-shopping-cart fa-2x text-success mb-3"></i>
                                    <h4 th:text="${statistics != null ? statistics.totalOrders : '0'}">0</h4>
                                    <p class="text-muted">订单总数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center">
                                <div class="card-body">
                                    <i class="fas fa-dollar-sign fa-2x text-info mb-3"></i>
                                    <h4 th:text="${statistics != null ? '¥' + #numbers.formatDecimal(statistics.totalRevenue, 1, 2) : '¥0.00'}">¥0.00</h4>
                                    <p class="text-muted">总收入</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 系统操作 -->
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">
                                <i class="fas fa-tools me-2"></i>系统操作（全都是模拟的）
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <h6><i class="fas fa-database me-2"></i>数据库操作</h6>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-outline-danger" onclick="backupDatabase()">
                                            备份数据库
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="clearLogs()">
                                            清理日志
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="resetSystem()">
                                            重置系统
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="col-md-4">
                                    <h6><i class="fas fa-users me-2"></i>用户操作</h6>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-outline-danger" onclick="exportUsers()">
                                            导出用户数据
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="sendNotification()">
                                            群发通知
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="generateReport()">
                                            生成报表
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="col-md-4">
                                    <h6><i class="fas fa-cog me-2"></i>系统配置</h6>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-outline-danger" onclick="updateConfig()">
                                            更新配置
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="restartService()">
                                            重启服务
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="viewSystemInfo()">
                                            系统信息
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/edu/js/bootstrap.bundle.min.js"></script>
    <script>
        // 数据库操作
        function backupDatabase() {
            if (confirm('确定要备份数据库吗？')) {
                alert('数据库备份已开始...');
            }
        }
        
        function clearLogs() {
            if (confirm('确定要清理系统日志吗？此操作不可恢复！')) {
                alert('系统日志已清理');
            }
        }
        
        function resetSystem() {
            if (confirm('警告：此操作将重置整个系统！确定继续吗？')) {
                alert('系统重置已开始...');
            }
        }
        
        // 用户操作
        function exportUsers() {
            // 模拟导出用户数据（包含敏感信息）
            const userData = {
                users: [
                    { id: 1, username: 'admin', password: 'admin123', email: 'admin@edu.com', phone: '13800000000' },
                    { id: 2, username: 'teacher', password: 'teacher123', email: 'teacher@edu.com', phone: '13800000010' },
                    { id: 3, username: 'student', password: 'student123', email: 'student@edu.com', phone: '13800000020' }
                ]
            };
            
            const blob = new Blob([JSON.stringify(userData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'users_export.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function sendNotification() {
            const message = prompt('请输入要发送的通知内容：');
            if (message) {
                alert(`通知已发送给所有用户：${message}`);
            }
        }
        
        function generateReport() {
            alert('正在生成系统报表...');
            setTimeout(() => {
                alert('报表生成完成！');
            }, 2000);
        }
        
        // 系统配置
        function updateConfig() {
            if (confirm('确定要更新系统配置吗？')) {
                alert('系统配置已更新');
            }
        }
        
        function restartService() {
            if (confirm('确定要重启系统服务吗？这将导致短暂的服务中断。')) {
                alert('系统服务正在重启...');
            }
        }
        
        function viewSystemInfo() {
            const systemInfo = `
系统信息：
- 操作系统：Windows 10
- Java版本：11.0.11
- 内存使用：2.5GB / 8GB
- 磁盘空间：45GB / 100GB
- 数据库：MySQL 8.0
- 当前用户：${document.querySelector('.navbar .dropdown-toggle span').textContent}
- 权限级别：管理员
- 登录IP：192.168.1.100
- 会话ID：sess_1234567890
            `;
            alert(systemInfo);
        }
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查用户权限
            const currentUser = document.querySelector('.navbar .dropdown-toggle span').textContent;
            console.log('当前用户：', currentUser);
            
            // 如果不是管理员但能访问此页面，显示警告
            if (!currentUser.includes('管理员') && !currentUser.includes('admin')) {
                console.warn('非管理员用户访问管理后台！');
            }
        });
    </script>
</body>
</html>

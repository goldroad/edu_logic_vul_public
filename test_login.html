<!DOCTYPE html>
<html>
<head>
    <title>登录测试</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>登录日志测试</h2>
    
    <div>
        <h3>测试管理员登录</h3>
        <button onclick="testAdminLogin()">测试管理员登录成功</button>
        <button onclick="testAdminLoginFail()">测试管理员登录失败</button>
    </div>
    
    <div>
        <h3>测试学生登录</h3>
        <button onclick="testStudentLogin()">测试学生登录成功</button>
        <button onclick="testStudentLoginFail()">测试学生登录失败</button>
    </div>
    
    <div>
        <h3>测试教师登录</h3>
        <button onclick="testTeacherLogin()">测试教师登录成功</button>
        <button onclick="testTeacherLoginFail()">测试教师登录失败</button>
    </div>
    
    <div id="result"></div>

    <script>
        function showResult(message) {
            document.getElementById('result').innerHTML = '<p>' + message + '</p>';
        }

        // 测试管理员登录成功
        function testAdminLogin() {
            const formData = new FormData();
            formData.append('username', 'admin');
            formData.append('password', '666666');
            formData.append('captcha', '1234'); // 简化验证码

            fetch('http://localhost:8081/edu/auth/login', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.redirected) {
                    showResult('管理员登录成功，重定向到: ' + response.url);
                } else {
                    return response.text();
                }
            })
            .then(text => {
                if (text) {
                    showResult('管理员登录响应: ' + text.substring(0, 200) + '...');
                }
            })
            .catch(error => {
                showResult('管理员登录错误: ' + error.message);
            });
        }

        // 测试管理员登录失败
        function testAdminLoginFail() {
            const formData = new FormData();
            formData.append('username', 'admin');
            formData.append('password', 'wrongpassword');
            formData.append('captcha', '1234');

            fetch('http://localhost:8081/edu/auth/login', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(text => {
                showResult('管理员登录失败测试: ' + text.substring(0, 200) + '...');
            })
            .catch(error => {
                showResult('管理员登录失败测试错误: ' + error.message);
            });
        }

            })
            .then(response => {
                if (response.redirected) {
                    showResult('学生登录成功，重定向到: ' + response.url);
                } else {

            })
            .then(text => {

            })
            .catch(error => {
                showResult('学生登录错误: ' + error.message);

        }

        // 测试学生登录失败
        function testStudentLoginFail() {

            })
            .then(response => response.text())
            .then(text => {
                showResult('学生登录失败测试: ' + text.substring(0, 200) + '...');
            })
            .catch(error => {
                showResult('学生登录失败测试错误: ' + error.message);
            });
        }

        // 测试教师登录成功
        function testTeacherLogin() {
            const formData = new FormData();
            formData.append('username', 'teacher');
            formData.append('password', 'teacher123');
            formData.append('captcha', '1234');

            fetch('http://localhost:8081/edu/auth/login', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.redirected) {
                    showResult('教师登录成功，重定向到: ' + response.url);
                } else {

            })
            .then(text => {

            })
            .catch(error => {
                showResult('教师登录错误: ' + error.message);
            });
        }

        // 测试教师登录失败
        function testTeacherLoginFail() {
            const formData = new FormData();
            formData.append('username', 'teacher');
            formData.append('password', 'wrongpassword');
            formData.append('captcha', '1234');

            fetch('http://localhost:8081/edu/auth/login', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(text => {
                showResult('教师登录失败测试: ' + text.substring(0, 200) + '...');
            })
            .catch(error => {
                showResult('教师登录失败测试错误: ' + error.message);
            });
        }
    </script>
</body>
</html>
